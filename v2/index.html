<style>
  :root{
    --bg:#0F2820; --surf:#163428; --card:#1B4D3E; --gold:#C9A84C; --text:#F5F0E8;
    --dim:#7FA88B; --border:#1E4A38; --ok:#6FCF97; --orange:#E0852E; --danger:#E07060;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);background:radial-gradient(125% 80% at 50% 16%, #18402F 0%, #0F2820 44%, #07140D 100%) fixed;}
  #app{max-width:680px;margin:0 auto;padding:18px 16px 64px;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
  button{font-family:inherit}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  input,select{font-family:inherit}
  .muted{color:var(--dim)}
  .row{display:flex;gap:10px;align-items:center}
  .wrap{display:flex;flex-wrap:wrap;gap:10px}
  .spacer{flex:1}
  /* top bar */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .back{background:var(--surf);border:1px solid var(--border);color:var(--text);
    border-radius:11px;padding:9px 13px;font-size:14px;cursor:pointer}
  .top h2{font-size:19px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);font-weight:800}
  /* card */
  .card{background:linear-gradient(160deg,#173B2D,#102A20);border:1px solid rgba(201,168,76,.18);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.04)}
  .card.flat{background:var(--surf)}
  /* tiles */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
  .tile{position:relative;border:1px solid var(--border);border-radius:18px;cursor:pointer;
    padding:18px 14px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between;
    background:linear-gradient(155deg,#1B4D3E,#143A2D);transition:transform .12s ease,border-color .12s ease}
  .tile:hover{transform:translateY(-2px);border-color:var(--gold)}
  .tile:active{transform:translateY(0)}
  .tile .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#0F2A1E,#0A1A12);border:1px solid var(--gold)}
  .tile .ic svg{width:25px;height:25px}
  .tile .lab{font-size:14px;font-weight:700;line-height:1.25}
  .tile .sub{font-size:11px;color:var(--dim);margin-top:2px}
  /* accueil — tuiles premium (identiques au launcher) */
  .exh-tile{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .exh-tile:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.55)!important;box-shadow:0 7px 20px rgba(0,0,0,.45)!important}
  .exh-tile:active{transform:scale(.96)}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .btn.primary{background:linear-gradient(180deg,#F4DE9C 0%,#DCBB60 52%,#C9A84C 100%);color:#1a1607;text-transform:uppercase;letter-spacing:.05em;box-shadow:0 6px 22px rgba(201,168,76,.34), inset 0 1px 0 rgba(255,255,255,.45)}
  .btn.ghost{background:var(--surf);color:var(--text);border:1px solid var(--border)}
  .btn.line{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn.block{width:100%}
  .btn:active{filter:brightness(.94)}
  /* form */
  label.f{display:block;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin:0 0 6px 2px}
  .inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;
    padding:12px;color:var(--text);font-size:15px}
  .field{margin-bottom:13px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  /* list rows */
  .line{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
  .line:last-child{border-bottom:none}
  .line .k{color:var(--dim);font-size:13px}
  .line .v{font-size:14px;font-weight:600;text-align:right}
  /* belt chip */
  .belt{display:inline-flex;align-items:center;gap:8px;background:var(--surf);
    border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:700}
  .dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.35)}
  /* misc */
  .title-xl{font-size:26px;line-height:1.1}
  .center{text-align:center}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;
    background:var(--surf);border:1px solid var(--border);color:var(--dim)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--card);
    border:1px solid var(--gold);color:var(--text);padding:11px 18px;border-radius:12px;font-size:13px;
    z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:90%}
  .sync{position:fixed;top:calc(env(safe-area-inset-top) + 10px);right:12px;font-size:11px;color:var(--dim);
    background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:4px 10px;z-index:50}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  ::placeholder{color:#557}
</style>
</head>

function num(v){ var n=parseFloat(v); return isNaN(n)?null:n; }
function fmtDate(iso){ if(!iso) return ""; var p=String(iso).slice(0,10).split("-"); return p.length===3 ? p[2]+"/"+p[1]+"/"+p[0] : iso; }
function slugLogin(nom){ return nom.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g,"").trim().split(/\s+/).join("."); }

var O = "url(#exhOrange)";
var ICONS = {

var CITATIONS=[{c:"sci",t:"Bouger régulièrement réduit le risque de mortalité toutes causes d'environ 30 % — la constance compte plus que l'intensité."},{c:"sci",t:"150 minutes d'activité modérée par semaine : le seuil recommandé par l'OMS pour protéger durablement ta santé."},{c:"sci",t:"Même 75 minutes d'activité soutenue par semaine suffisent à réduire nettement le risque cardiovasculaire."},{c:"sci",t:"La régularité de l'activité physique est l'un des prédicteurs les plus fiables de la longévité en bonne santé."},{c:"sci",t:"Marcher chaque jour est associé à une baisse mesurable de la mortalité, et le bénéfice grimpe avec le nombre de pas."},{c:"sci",t:"Dès 4 000 pas par jour, le risque de mortalité commence à diminuer significativement."},{c:"sci",t:"Autour de 7 000 à 8 000 pas quotidiens, on capte l'essentiel des bénéfices sur la longévité."},{c:"sci",t:"L'activité physique régulière abaisse la tension artérielle, comme un médicament — mais sans ordonnance."},{c:"sci",t:"Bouger souvent améliore la sensibilité à l'insuline et protège contre le diabète de type 2."},{c:"sci",t:"Une bonne capacité cardio-respiratoire est l'un des meilleurs indicateurs d'espérance de vie."},{c:"sci",t:"Remplacer 30 minutes assises par de l'activité légère est associé à une baisse du risque de décès prématuré."},{c:"sci",t:"L'activité régulière réduit le risque de plusieurs cancers, dont ceux du côlon et du sein."},{c:"sci",t:"Le cœur est un muscle : sollicité régulièrement, il devient plus efficace et bat plus lentement au repos."},{c:"sci",t:"Une fréquence cardiaque de repos basse reflète souvent un cœur entraîné et en bonne santé."},{c:"sci",t:"L'exercice régulier augmente le « bon » cholestérol (HDL) et aide à réguler les triglycérides."},{c:"sci",t:"Bouger fait baisser l'inflammation chronique de bas grade, impliquée dans de nombreuses maladies."},{c:"sci",t:"Les populations les plus longévives du monde ne font pas de sport intense : elles bougent sans arrêt, naturellement."},{c:"sci",t:"L'activité physique régulière renforce le système immunitaire et réduit la fréquence des infections."},{c:"sci",t:"Chaque tranche d'activité compte : les bénéfices cardiovasculaires s'accumulent sur toute la vie."},{c:"sci",t:"Rester actif en vieillissant préserve l'autonomie et réduit fortement le risque de chute."},{c:"sci",t:"L'activité physique régulière stimule le BDNF, une protéine clé pour la mémoire et l'apprentissage."},{c:"sci",t:"Bouger régulièrement réduit les symptômes d'anxiété et de dépression, avec un effet comparable à certaines thérapies."},{c:"sci",t:"L'exercice libère des endorphines : 20 minutes suffisent souvent à améliorer l'humeur."},{c:"sci",t:"L'activité physique régulière améliore la qualité et la profondeur du sommeil."},{c:"sci",t:"Une marche quotidienne réduit le stress en abaissant le cortisol."},{c:"sci",t:"Le mouvement régulier protège le cerveau du déclin cognitif lié à l'âge."},{c:"sci",t:"L'exercice augmente le flux sanguin cérébral et favorise la création de nouveaux neurones."},{c:"sci",t:"Bouger améliore la concentration et la productivité dans les heures qui suivent."},{c:"sci",t:"L'activité physique régulière est associée à un risque réduit de démence et d'Alzheimer."},{c:"sci",t:"Une simple pause active au travail relance l'attention et réduit la fatigue mentale."},{c:"sci",t:"Le sommeil et l'activité physique se renforcent mutuellement : mieux tu bouges, mieux tu dors, et inversement."},{c:"sci",t:"S'exposer au mouvement en journée aide à réguler l'horloge biologique et l'endormissement."},{c:"sci",t:"L'exercice régulier améliore l'estime de soi, indépendamment des résultats esthétiques."},{c:"sci",t:"Bouger en pleine nature amplifie les bénéfices sur l'humeur et la réduction du stress."},{c:"sci",t:"La régularité du mouvement nourrit la résilience face au stress du quotidien."},{c:"sci",t:"Après 30 ans, on perd naturellement du muscle chaque année : la régularité du mouvement freine ce déclin."},{c:"sci",t:"Le renforcement musculaire régulier préserve la masse musculaire et la force jusqu'à un âge avancé."},{c:"sci",t:"Les os se renforcent quand on les sollicite : marcher, monter, porter stimule la densité osseuse."},{c:"sci",t:"Le muscle est métaboliquement actif : plus tu en entretiens, plus tu dépenses d'énergie au repos."},{c:"sci",t:"Le NEAT — l'énergie dépensée hors sport, dans les gestes du quotidien — représente une large part de la dépense quotidienne."},{c:"sci",t:"Monter les escaliers, porter ses courses, jardiner : ces gestes comptent autant que bien des séances."},{c:"sci",t:"Bouger après un repas aide à réguler la glycémie : quelques minutes suffisent."},{c:"sci",t:"Se lever et bouger 2 à 3 minutes chaque demi-heure contrecarre les effets de la position assise prolongée."},{c:"sci",t:"La sédentarité est un facteur de risque indépendant : même sportif, rester assis trop longtemps nuit."},{c:"sci",t:"Les muscles sollicités régulièrement deviennent de meilleurs « capteurs » de sucre dans le sang."},{c:"sci",t:"L'activité régulière entretient la souplesse des articulations et réduit les raideurs."},{c:"sci",t:"Travailler l'équilibre quelques minutes par jour réduit nettement le risque de chute avec l'âge."},{c:"sci",t:"La force de préhension est un marqueur de santé globale — la cultiver porte ses fruits."},{c:"sci",t:"Le corps s'adapte à ce qu'on lui demande souvent : la régularité façonne durablement la physiologie."},{c:"sci",t:"Bouger entretient la masse maigre, qui protège le métabolisme sur le long terme."},{c:"sci",t:"Fractionner l'activité en petites doses dans la journée est aussi efficace qu'une longue séance continue."},{c:"sci",t:"L'« exercice snacking » — de courtes bouffées d'effort — améliore la condition physique avec une excellente adhérence."},{c:"sci",t:"Quelques minutes d'effort avant un repas peuvent améliorer le contrôle de la glycémie."},{c:"sci",t:"En moyenne, il faut environ 66 jours pour qu'un comportement devienne automatique — la patie rs intenses, d'autres légers, mais bouger toujours."},{c:"sport",t:"Compter ses séances sur le mois, pas sur la journée : c'est l'accumulation qui transforme."},{c:"sport",t:"Le mouvement le plus utile est celui qui s'intègre sans effort dans ta journée."},{c:"sport",t:"S'entraîner avec quelqu'un double l'adhérence : l'engagement social soutient la régularité."},{c:"sport",t:"Note tes séances : ce qui se mesure se maintient."},{c:"sport",t:"Le meilleur exercice pour toi est celui que tu aimes assez pour le répéter longtemps."},{c:"sport",t:"Démarrer petit et tenir longtemps bat démarrer fort et abandonner vite."},{c:"sport",t:"La forme physique est une compétence : elle s'entretient par la pratique, pas par la volonté ponctuelle."},{c:"sport",t:"Monter les escaliers est l'un des gestes les plus complets : jambes, fessiers, cœur, souffle."},{c:"sport",t:"Quelques étages par jour, c'est un entraînement cardio gratuit qui s'accumule au fil de l'année."},{c:"sport",t:"Marcher d'un bon pas 10 minutes relance la circulation et réveille le métabolisme."},{c:"sport",t:"Faire ses courses à pied, c'est du renforcement fonctionnel déguisé en routine."},{c:"sport",t:"Se garer plus loin, descendre un arrêt plus tôt : des minutes actives qui comptent vraiment."},{c:"sport",t:"Le ménage actif — porter, ranger, frotter — est une vraie dépense énergétique, pas une corvée."},{c:"sport",t:"Jardiner sollicite force, mobilité et endurance : un entraînement complet en plein air."},{c:"sport",t:"Transformer un geste du quotidien en exercice, c'est gagner du temps et de la santé d'un coup."},{c:"sport",t:"Téléphoner en marchant transforme un temps passif en mouvement utile."},{c:"sport",t:"Chaque escalier monté est un dépôt sur ton compte santé à long terme."},{c:"sport",t:"Préférer l'escalier à l'ascenseur, c'est une décision minuscule aux effets cumulés énormes."},{c:"sport",t:"Bien se baisser (en pliant les genoux, dos droit) renforce les jambes à chaque ramassage."},{c:"sport",t:"Porter ses sacs en gainant le ventre, c'est du renforcement profond à chaque trajet."},{c:"sport",t:"Le mouvement intégré au quotidien est le plus durable : pas besoin d'y « penser » comme à une séance."},{c:"sport",t:"Une journée active vaut mieux qu'une heure de sport suivie de douze heures assises."},{c:"conseil",t:"Associe ta nouvelle habitude à un repère existant : « après le café, je bouge 5 minutes »."},{c:"conseil",t:"Rends le mouvement inévitable : pose tes baskets en évidence la veille."},{c:"conseil",t:"Commence ridiculement petit : une habitude minuscule tenue bat une grande abandonnée."},{c:"conseil",t:"Vise la régularité avant la durée : 5 minutes chaque jour valent mieux qu'une heure le dimanche."},{c:"conseil",t:"Si tu sautes un jour, ne saute jamais deux jours de suite : c'est la règle d'or de la constance."},{c:"conseil",t:"Planifie le moment exact où tu bougeras : une intention datée a bien plus de chances d'aboutir."},{c:"conseil",t:"Prépare l'environnement : moins il y a de friction, plus l'habitude tient."},{c:"conseil",t:"Célèbre chaque petite victoire : le cerveau répète ce qui est récompensé."},{c:"conseil",t:"Garde une trace visible de ta régularité : une série qui s'allonge motive à ne pas la rompre."},{c:"conseil",t:"Choisis une activité que tu peux faire même fatiguée : c'est elle qui tiendra dans la durée."},{c:"conseil",t:"Le « assez bien » fait, régulièrement, bat le « parfait » jamais commencé."},{c:"conseil",t:"Réduis l'objectif les jours difficiles, mais ne le supprime pas : garder le fil compte plus que la quantité."},{c:"conseil",t:"Empile les habitudes : ajoute le nouveau geste juste après un geste déjà automatique."},{c:"conseil",t:"Rends-le agréable : musique, podcast, paysage — le plaisir entretient la constance."},{c:"conseil",t:"Engage-toi auprès de quelqu'un : dire son objectif à voix haute augmente l'adhérence."},{c:"conseil",t:"Anticipe les obstacles : prévois un plan B pour les jours de pluie ou de fatigue."},{c:"conseil",t: function emptyClient(nom){
  return { id:genId(), nom:nom||"", login:slugLogin(nom||"cliente"), pin:"1234",
    profil:{ age:"", taille:"", sexe:"", niveau:"" },
    objectifText:"", dateDebut:today(),
    joursReussis:[], objectifs:[], mesures:[], cibles:{ basale:null },
    _mtime:0 };
}
function unionBy(arr, keyFn){
  var map={};
  arr.forEach(function(x){ var k=keyFn(x); if(k==null) return; if(!(k in map) || (x._ts||0) >= (map[k]._ts||0)) map[k]=x; });
  return Object.keys(map).map(function(k){ return map[k]; });
}
/* fusion convergente d'une fiche : on ne perd jamais une entrée */
function mergeClient(a, b){
  if(!a) return b; if(!b) return a;
  var newer = (b._mtime||0) >= (a._mtime||0) ? b : a;
  var older = newer===b ? a : b;
  var m = Object.assign({}, older, newer);            // champs simples = côté le plus récent
  m.mesures   = unionBy((a.mesures||[]).concat(b.mesures||[]),   function(x){ return x.id; });
  m.objectifs = unionBy((a.objectifs||[]).concat(b.objectifs||[]),function(x){ return x.id; });
  m.joursReussis = Array.from(new Set((a.joursReussis||[]).concat(b.joursReussis||[]))).sort();
  m._mtime = Math.max(a._mtime||0, b._mtime||0);
  return m;
}
function ckey(id){ return "v2:c:" + id; }
function lkey(id){ return "exhome_v2_" + id; }

function loadClient(id){
  var local = readLS(lkey(id));
  return cloudGet(ckey(id)).then(function(cloud){
    var merged = mergeClient(local, cloud) || local || cloud;
    if(merged) writeLS(lkey(id), merged);
    return merged;
  }).catch(function(){ return local; });
}
/* sauvegarde = relire le cloud puis fusionner avant d'écrire (anti-écrasement) */
function saveClient(c){
  c._mtime = Date.now();
  writeLS(lkey(c.id), c);
  return cloudGet(ckey(c.id)).then(function(cloud){
    var merged = mergeClient(cloud, c); merged._mtime = Date.now();
    writeLS(lkey(merged.id), merged);
    return cloudPut(ckey(merged.id), merged).then(function(){ return merged; });
  }).catch(function(){ return cloudPut(ckey(c.id), c).then(function(){ return c; }); });
}

var RKEY = "v2:__roster";
function loadRoster(){
  var local = readLS("exhome_v2_roster") || { clients:[], _mtime:0 };
  return cloudGet(RKEY).then(function(cloud){
    var merged = mergeRoster(local, cloud);
    writeLS("exhome_v2_roster", merged);
    return merged;
  }).catch(function(){ return local; });
}
function mergeRoster(a,b){
  if(!a) return b; if(!b) return a;
  var clients = unionBy((a.clients||[]).concat(b.clients||[]), function(x){ return x.id; });
  return { clients:clients, _mtime:Math.max(a._mtime||0,b._mtime||0) };
}
function saveRoster(r){
  r._mtime = Date.now(); writeLS("exhome_v2_roster", r);
  return cloudGet(RKEY).then(function(cloud){
    var merged = mergeRoster(cloud, r); merged._mtime=Date.now();
    writeLS("exhome_v2_roster", merged);
    return cloudPut(RKEY, merged).then(function(){ return merged; });
  }).catch(function(){ return cloudPut(RKEY, r).then(function(){ return r; }); });
}

    +'<div style="margin-top:11px;font-size:12px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase">Ergo · Optimisation · Mouvement</div>';
  app.appendChild(head);

  var card=el("div","card");
  var ti=el("h3","center"); ti.textContent="Connexion"; ti.style.fontSize="20px"; card.appendChild(ti);
  var sub=el("div","center muted"); sub.style.cssText="margin:6px 0 18px;font-size:13px"; sub.textContent="Accès réservé aux membres Ex Home"; card.appendChild(sub);
  var idIn=input("",{placeholder:"Identifiant",autocapitalize:"none",autocorrect:"off"});
  var pinIn=input("",{placeholder:"Mot de passe",type:"password"});
  card.appendChild(field("Identifiant", idIn));
  card.appendChild(field("Mot de passe", pinIn));

  var rem=el("div","row"); rem.style.margin="4px 0 6px";
  var on=true; var tog=el("button"); tog.setAttribute("aria-label","Se souvenir de moi");
  tog.style.cssText="width:46px;height:27px;border-radius:999px;border:none;cursor:pointer;position:relative;background:var(--gold);flex-shrink:0;transition:background .15s";
  var knob=el("div"); knob.style.cssText="position:absolute;top:3px;left:22px;width:21px;height:21px;border-radius:50%;background:#0F2820;transition:left .15s"; tog.appendChild(knob);
  tog.onclick=function(){ on=!on; tog.style.background=on?"var(--gold)":"var(--border)"; knob.style.left=on?"22px":"3px"; };
  var rl=el("div"); rl.style.cssText="font-weight:700;font-size:14px"; rl.textContent="Se souvenir de moi";
  rem.appendChild(tog); rem.appendChild(rl); card.appendChild(rem);
  var note=el("div","muted"); note.style.cssText="font-size:11px;margin:0 0 16px"; note.textContent="✓ Identifiant et mot de passe mémorisés sur cet appareil"; card.appendChild(note);

  var go=el("button","btn primary block","Se connecter →");
  card.appendChild(go); app.appendChild(card);
  var err=el("div","center"); err.style.cssText="color:var(--danger);margin:10px 0 0;font-size:13px"; app.appendChild(err);

  function attempt(){
    var u=(idIn.value||"").trim().toLowerCase(), p=(pinIn.value||"").trim();
    if(!u||!p){ err.textContent="Entre ton identifiant et ton mot de passe."; return; }
    if(COACHES[u] && COACHES[u]===p){ setSession({role:"coach",coach:u}); render(); return; }
    err.textContent="Vérification…";
    loadRoster().then(seedIfEmpty).then(function(r){
      var m=(r.clients||[]).filter(function(c){ return c.login===u && String(c.pin)===p; })[0];
      if(m){ setSession({role:"client",clientId:m.id,nom:m.nom}); render(); }
      else err.textContent="Identifiant ou mot de passe incorrect.";
    });
  }
  go.onclick=attempt;
  pinIn.addEventListener("keydown",function(e){ if(e.key==="Enter") attempt(); });

  app.appendChild(phraseCard());
}

/* ---------- ROSTER (coach) ---------- */
function screenRoster(){
  clear();
  var t=topbar("Mes pratiquantes","Coach "+esc(session.coach));
  var out=el("button","back"); out.textContent="Quitter"; out.onclick=logout; t.appendChild(el("div","spacer")); t.appendChild(out);

  var loading=el("div","muted center","Chargement…"); loading.style.margin="30px 0"; app.appendChild(loading);

  loadRoster().then(seedIfEmpty).then(function(r){
    loading.remove();
    var list=el("div");
    (r.clients||[]).forEach(function(cl){
      var card=el("div","card"); card.style.cursor="pointer"; card.style.display="flex"; card.style.alignItems="center"; card.style.gap="13px";
      card.innerHTML='<div style="width:42px;height:42px;border-radius:12px;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold)">'+esc((cl.nom||"?").slice(0,1).toUpperCase())+'</div>';
      var info=el("div"); info.style.flex="1";
      info.innerHTML='<div style="font-weight:700">'+esc(cl.nom)+'</div><div class="muted" style="font-size:12px">Identifiant : '+esc(cl.login)+'</div>';
      card.appendChild(info);
      var beltSpan=el("span","pill","…"); card.appendChild(beltSpan);
      card.onclick=function(){ openClient(cl.id, false); };
      list.appendChild(card);
      loadClient(cl.id).then(function(full){ if(full){ var b=belt((full.joursReussis||[]).length); beltSpan.textContent=b.n; beltSpan.style.color=b.c; } });
    });
    app.appendChild(list);

    var add=el("button","btn line block","+ Ajouter une pratiquante"); add.style.marginTop="6px";
    add.onclick=function(){ addClientForm(r); };
    app.appendChild(add);
  });
}
function addClientForm(roster){
  clear();
  topbar("Nouvelle pratiquante","Coach", screenRoster);
  var c=el("div","card");
  var nom=input("",{placeholder:"Prénom Nom"});
  var pin=input("1234",{placeholder:"Code à 4 chiffres", inputmode:"numeric"});
  c.appendChild(field("Nom complet", nom));
  c.appendChild(field("Code d'accès", pin));
  var save=el("button","btn primary block","Créer la fiche"); c.appendChild(save); app.appendChild(c);
  save.onclick=function(){
    var n=(nom.value||"").trim(); if(!n){ toast("Indique un nom."); return; }
    var cli=emptyClient(n); cli.pin=(pin.value||"1234").trim();
    // login unique
    var base=cli.login, k=1, taken=(roster.clients||[]).map(function(x){return x.login;});
    while(taken.indexOf(cli.login)>-1){ cli.login=base+(++k); }
    save.disabled=true; save.textContent="Création…";
    saveClient(cli).then(function(){
      roster.clients=(roster.clients||[]).concat([{id:cli.id,nom:cli.nom,login:cli.login,pin:cli.pin}]);
      return saveRoster(roster);
    }).then(function(){ toast("Fiche créée"); screenRoster(); });
  };
}

/* ---------- ACCUEIL CLIENTE (coach ou cliente) ---------- */
function openClient(id, isSelf){
  clear();
  var loading=el("div","muted center","Chargement…"); loading.style.margin="30px 0"; app.appendChild(loading);
  loadClient(id).then(function(c){
    loading.remove();
    if(!c){ toast("Fiche introuvable"); render(); return; }
    var back = isSelf ? logout : screenRoster;
    var t=topbar(c.nom || "Pratiquante", isSelf?"Mon espace":"Pratiquante", back);
    if(isSelf){ var out=el("button","back"); out.textContent="Quitter"; out.onclick=logout; t.appendChild(el("div","spacer")); t.appendChild(out); }

    // bonjour + phrase du jour
    var hello=el("div"); hello.style.cssText="font-size:15px;color:var(--dim);margin:2px 0 12px";
    hello.textContent="Bonjour "+(((c.nom||"").trim().split(" ")[0])||"")+" 👋";
    app.appendChild(hello);
    app.appendChild(phraseCard());
    // bandeau progression
    var jours=(c.joursReussis||[]).length, b=belt(jours), nb=nextBelt(jours);
    var head=el("div","card");
    head.innerHTML='<div class="row" style="justify-content:space-between">'
      +'<div><div class="eyebrow">Progression</div><div style="font-size:22px;font-weight:800;margin-top:3px">'+jours+' jours</div></div>'
      +'<span class="belt"><span class="dot" style="background:'+b.c+'"></span>Ceinture '+b.n+'</span></div>'
      +(nb?'<div class="muted" style="font-size:12px;margin-top:9px">Prochaine : '+nb.n+' à '+nb.min+' jours ('+(nb.min-jours)+' restants)</div>':'<div class="muted" style="font-size:12px;margin-top:9px">Ceinture maximale atteinte 🎉</div>');
    app.appendChild(head);

    // accueil — tuiles premium identiques au launcher
    var mob = window.innerWidth < 560;
    var grid=el("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax("+(mob?104:94)+"px,1fr));gap:"+(mob?16:14)+"px;margin-top:6px";
    var sz = mob?30:27, PW = mob?54:48;
    function appIcon(icon,label,fn){
      var b=el("button","exh-tile");
      b.style.cssText="display:flex;flex-direction:column;align-items:center;gap:"+(mob?11:9)+"px;background:linear-gradient(160deg,var(--card),var(--surf));border:1px solid rgba(201,168,76,.30);border-radius:20px;padding:"+(mob?18:16)+"px 8px;cursor:pointer;color:var(--text);font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05)";
      var plate=el("div"); plate.style.cssText="width:"+PW+"px;height:"+PW+"px;border-radius:16px;padding:1.5px;background:linear-gradient(145deg,#F4DE9C 0%,#C9A84C 46%,#8C6826 100%);box-shadow:0 4px 11px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.35)";
      var inner=el("div"); inner.style.cssText="width:100%;height:100%;border-radius:14.5px;display:flex;align-items:center;justify-content:center;background:radial-gradient(130% 115% at 50% 0%, #1C4231 0%, #0E2419 55%, #081310 100%);box-shadow:inset 0 -6px 11px rgba(0,0,0,.45), inset 0 1px 1px rgba(255,255,255,.06)";
      inner.innerHTML='<svg viewBox="0 0 24 24" width="'+sz+'" height="'+sz+'" fill="none" stroke="url(#exhGold)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 3px rgba(248,235,194,.28)) drop-shadow(0 1px 1px rgba(0,0,0,.45))">'+(ICONS[icon]||"")+'</svg>';
      plate.appendChild(inner);
      var lb=el("div"); lb.textContent=label; lb.style.cssText="font-size:"+(mob?12:11)+"px;font-weight:600;text-align:center;color:var(--text);letter-spacing:.02em";
      b.appendChild(plate); b.appendChild(lb); b.onclick=fn; grid.appendChild(b);
    }
    appIcon("calendar","Valider", function(){ screenProgression(c, isSelf); });
    appIcon("chart","Mesures", function(){ screenMesures(c, isSelf); });
    appIcon("target","Objectifs", function(){ screenObjectifs(c, isSelf); });
    appIcon("user","Profil", function(){ screenProfil(c, isSelf); });
    app.appendChild(grid);
    var foot=el("div","center muted"); foot.style.cssText="margin-top:30px;font-size:11px;letter-spacing:.04em"; foot.textContent="Ex Home · v2 · 30-06"; app.appendChild(foot);
  });
}

/* ---------- PROGRESSION ---------- */
function screenProgression(c, isSelf){
  clear();
  topbar("Progression", c.nom, function(){ openClient(c.id, isSelf); });
  var jours=(c.joursReussis||[]).length, b=belt(jours), nb=nextBelt(jours);
  var head=el("div","card center");
  head.innerHTML='<div class="belt" style="font-size:15px"><span class="dot" style="background:'+b.c+'"></span>Ceinture '+b.n+'</div>'
    +'<div style="font-size:34px;font-weight:800;margin:14px 0 2px">'+jours+'</div><div class="muted">jours validés</div>'
    +(nb?'<div class="muted" style="font-size:12px;margin-top:10px">'+(nb.min-jours)+' jours avant la ceinture '+nb.n+'</div>':'');
  app.appendChild(head);

  var done = (c.joursReussis||[]).indexOf(today())>-1;
  var btn=el("button","btn block "+(done?"ghost":"primary"), done?"✓ Journée déjà validée":"Valider aujourd'hui");
  btn.disabled=done;
  btn.onclick=function(){
    if(c.joursReussis.indexOf(today())>-1) return;
    c.joursReussis=(c.joursReussis||[]).concat([today()]).sort();
    btn.disabled=true; btn.textContent="Enregistrement…";
    saveClient(c).then(function(m){ Object.assign(c,m); toast("Journée validée 💪"); screenProgression(c,isSelf); });
  };
  app.appendChild(btn);

  // historique récent
  if((c.joursReussis||[]).length){
    var hist=el("div","card"); hist.appendChild(el("div","eyebrow","Derniers jours"));
    var sp=el("div"); sp.style.height="8px"; hist.appendChild(sp);
    c.joursReussis.slice(-12).reverse().forEach(function(d){
      var l=el("div","line"); l.innerHTML='<span class="k">'+fmtDate(d)+'</span><span class="v" style="color:var(--ok)">validé</span>'; hist.appendChild(l);
    });
    app.appendChild(hist);
  }
}

/* ---------- MESURES (source unique) ---------- */
var MES_FIELDS = [
  { k:"poids",        lab:"Poids",            u:"kg" },
  { k:"graisse",      lab:"Masse grasse",     u:"%"  },
  { k:"muscle",       lab:"Masse musculaire", u:"%"  },
  { k:"eau",          lab:"Eau",              u:"%"  },
  { k:"imc",          lab:"IMC",              u:""   },
  { k:"tourTaille",   lab:"Tour de taille",   u:"cm" },
  { k:"tourHanches",  lab:"Tour de hanches",  u:"cm" },
  { k:"fcRepos",      lab:"FC au repos",      u:"bpm"}
];
function visibleMes(c){ return (c.mesures||[]).filter(function(m){ return !m.del; }).sort(function(a,b){ return (b.date||"").localeCompare(a.date||"")||((b._ts||0)-(a._ts||0)); }); }

function screenMesures(c, isSelf){
  clear();
  topbar("Mesures", c.nom, function(){ openClient(c.id, isSelf); });
  app.appendChild(el("div","muted","Un seul endroit pour tes mesures. Tout est synchronisé entre la pratiquante et le coach."));
  var addBtn=el("button","btn line block","+ Ajouter une mesure"); addBtn.style.margin="14px 0";
  addBtn.onclick=function(){ mesureForm(c, isSelf, null); };
  app.appendChild(addBtn);

  var mes=visibleMes(c);
  if(!mes.length){ app.appendChild(el("div","card center muted","Aucune mesure pour l'instant. Ajoute la première.")); return; }

  // évolution poids (première vs dernière)
  var withPoids=mes.filter(function(m){ return m.poids!=null; });
  if(withPoids.length>=2){
    var last=withPoids[0], first=withPoids[withPoids.length-1], d=(last.poids-first.poids);
    var ev=el("div","card");
    ev.innerHTML='<div class="eyebrow">Évolution du poids</div>'
      +'<div class="row" style="justify-content:space-between;margin-top:8px">'
      +'<span class="muted">'+fmtDate(first.date)+' → '+fmtDate(last.date)+'</span>'
      +'<span style="font-weight:800;color:'+(d<=0?"var(--ok)":"var(--orange)")+'">'+(d>0?"+":"")+d.toFixed(1)+' kg</span></div>';
    app.appendChild(ev);
  }

  mes.forEach(function(m){
    var card=el("div","card");
    var hdr=el("div","row"); hdr.style.justifyContent="space-between"; hdr.style.marginBottom="6px";
    hdr.innerHTML='<div style="font-weight:700">'+fmtDate(m.date)+'</div>';
    var edit=el("button","back"); edit.textContent="Modifier"; edit.style.fontSize="12px"; edit.onclick=function(){ mesureForm(c,isSelf,m); };
    hdr.appendChild(edit); card.appendChild(hdr);
    var has=false;
    MES_FIELDS.forEach(function(f){ if(m[f.k]!=null){ has=true; var l=el("div","line"); l.innerHTML='<span class="k">'+f.lab+'</span><span class="v">'+m[f.k]+(f.u?" "+f.u:"")+'</span>'; card.appendChild(l); } });
    if(!has) card.appendChild(el("div","muted","(vide)"));
    app.appendChild(card);
  });
}
function mesureForm(c, isSelf, existing){
  clear();
  topbar(existing?"Modifier la mesure":"Nouvelle mesure", c.nom, function(){ screenMesures(c,isSelf); });
  var m = existing || { id:genId(), date:today() };
  var card=el("div","card");
  var dateIn=input(m.date||today(), {type:"date"});
  card.appendChild(field("Date", dateIn));
  var grid=el("div","two");
  var inputs={};
  MES_FIELDS.forEach(function(f){
    var i=input(m[f.k]==null?"":m[f.k], {type:"number", inputmode:"decimal", placeholder:f.u||""});
    inputs[f.k]=i; grid.appendChild(field(f.lab+(f.u?" ("+f.u+")":""), i));
  });
  card.appendChild(grid); app.appendChild(card);

  var save=el("button","btn primary block","Enregistrer"); app.appendChild(save);
  save.onclick=function(){
    m.date=dateIn.value||today(); m._ts=Date.now(); m.del=false;
    MES_FIELDS.forEach(function(f){ var v=num(inputs[f.k].value); if(v==null) delete m[f.k]; else m[f.k]=v; });
    if(!existing){ c.mesures=(c.mesures||[]).concat([m]); }
    else { c.mesures=(c.mesures||[]).map(function(x){ return x.id===m.id ? m : x; }); }
    save.disabled=true; save.textContent="Enregistrement…";
    saveClient(c).then(function(mc){ Object.assign(c,mc); toast("Mesure enregistrée"); screenMesures(c,isSelf); });
  };
  if(existing){
    var del=el("button","btn danger block","Supprimer cette mesure"); del.style.marginTop="10px";
    del.onclick=function(){
      var x=(c.mesures||[]).filter(function(y){return y.id===m.id;})[0];
      if(x){ x.del=true; x._ts=Date.now(); }
      saveClient(c).then(function(mc){ Object.assign(c,mc); toast("Mesure supprimée"); screenMesures(c,isSelf); });
    };
    app.appendChild(del);
  }
}

/* ---------- OBJECTIFS ---------- */
function screenObjectifs(c, isSelf){
  clear();
  topbar("Objectifs", c.nom, function(){ openClient(c.id, isSelf); });
  var addCard=el("div","card");
  var ni=input("",{placeholder:"Nouvel objectif (ex : bouger 10 min/jour)"});
  var add=el("button","btn primary block","Ajouter"); add.style.marginTop="4px";
  addCard.appendChild(field("Ajouter un objectif", ni)); addCard.appendChild(add); app.appendChild(addCard);
  add.onclick=function(){
    var v=(ni.value||"").trim(); if(!v) return;
    c.objectifs=(c.objectifs||[]).concat([{ id:genId(), texte:v, fait:false, _ts:Date.now() }]);
    saveClient(c).then(function(mc){ Object.assign(c,mc); screenObjectifs(c,isSelf); });
  };
  var objs=(c.objectifs||[]).filter(function(o){return !o.del;});
  if(!objs.length){ app.appendChild(el("div","card center muted","Aucun objectif pour l'instant.")); return; }
  var list=el("div","card");
  objs.forEach(function(o,i){
    var row=el("div","line"); row.style.cursor="pointer";
    row.innerHTML='<span class="k" style="color:'+(o.fait?"var(--ok)":"var(--text)")+';text-decoration:'+(o.fait?"line-through":"none")+'">'+(o.fait?"✓ ":"○ ")+esc(o.texte)+'</span>';
    var x=el("button","back"); x.textContent="✕"; x.style.fontSize="12px"; x.style.padding="4px 9px";
    x.onclick=function(e){ e.stopPropagation(); o.del=true; o._ts=Date.now(); saveClient(c).then(function(mc){ Object.assign(c,mc); screenObjectifs(c,isSelf); }); };
    row.appendChild(x);
    row.onclick=function(){ o.fait=!o.fait; o._ts=Date.now(); saveClient(c).then(function(mc){ Object.assign(c,mc); screenObjectifs(c,isSelf); }); };
    list.appendChild(row);
  });
  app.appendChild(list);
}

/* ---------- PROFIL ---------- */
function screenProfil(c, isSelf){
  clear();
  topbar("Profil", c.nom, function(){ openClient(c.id, isSelf); });
  var card=el("div","card");
  var nom=input(c.nom,{placeholder:"Nom"});
  var age=input(c.profil&&c.profil.age,{type:"number",inputmode:"numeric",placeholder:"ans"});
  var taille=input(c.profil&&c.profil.taille,{type:"number",inputmode:"numeric",placeholder:"cm"});
  var niveau=el("select","inp");
  ["","Débutante","Intermédiaire","Avancée"].forEach(function(o){ var op=document.createElement("option"); op.value=o; op.textContent=o||"Niveau…"; if((c.profil&&c.profil.niveau)===o) op.selected=true; niveau.appendChild(op); });
  var dateDeb=input((c.dateDebut||"").slice(0,10),{type:"date"});
  var objectif=input(c.objectifText,{placeholder:"Objectif principal"});

  card.appendChild(field("Nom", nom));
  var two=el("div","two"); two.appendChild(field("Âge", age)); two.appendChild(field("Taille (cm)", taille)); card.appendChild(two);
  card.appendChild(field("Niveau", niveau));
  card.appendChild(field("Date de début", dateDeb));
  card.appendChild(field("Objectif principal", objectif));
  app.appendChild(card);

  // identifiants (coach seulement)
  if(!isSelf){
    var idc=el("div","card flat");
    idc.appendChild(el("div","eyebrow","Accès de la pratiquante"));
    var sp=el("div"); sp.style.height="10px"; idc.appendChild(sp);
    var login=input(c.login,{autocapitalize:"none"}); var pin=input(c.pin,{});
    idc.appendChild(field("Identifiant", login)); idc.appendChild(field("Code", pin));
    app.appendChild(idc);
  }

  var save=el("button","btn primary block","Enregistrer le profil"); app.appendChild(save);
  save.onclick=function(){
    c.nom=(nom.value||"").trim()||c.nom;
    c.profil=c.profil||{}; c.profil.age=age.value; c.profil.taille=taille.value; c.profil.niveau=niveau.value;
    c.dateDebut=dateDeb.value||c.dateDebut; c.objectifText=objectif.value;
    if(!isSelf){ c.login=(login.value||c.login).trim(); c.pin=(pin.value||c.pin).trim(); }
    save.disabled=true; save.textContent="Enregistrement…";
    saveClient(c).then(function(mc){
      Object.assign(c,mc);
      // tenir le roster à jour (nom/login/pin)
      if(!isSelf){ loadRoster().then(function(r){
        r.clients=(r.clients||[]).map(function(x){ return x.id===c.id ? {id:c.id,nom:c.nom,login:c.login,pin:c.pin} : x; });
        saveRoster(r);
      }); }
      toast("Profil enregistré"); screenProfil(c,isSelf);
    });
  };
}

/* ---------- démarrage ---------- */
render();
</script>
