<title>Ex Home</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --bg:#0F2820; --surf:#163428; --card:#1B4D3E; --gold:#C9A84C; --text:#F5F0E8;
    --dim:#7FA88B; --border:#1E4A38; --ok:#6FCF97; --orange:#E0852E; --danger:#E07060;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);background:radial-gradient(125% 80% at 50% 16%, #18402F 0%, #0F2820 44%, #07140D 100%) fixed;}
  #app{max-width:680px;margin:0 auto;padding:18px 16px 64px;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
  button{font-family:inherit}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  input,select{font-family:inherit}
  .muted{color:var(--dim)}
  .row{display:flex;gap:10px;align-items:center}
  .wrap{display:flex;flex-wrap:wrap;gap:10px}
  .spacer{flex:1}
  /* top bar */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .back{background:var(--surf);border:1px solid var(--border);color:var(--text);
    border-radius:11px;padding:9px 13px;font-size:14px;cursor:pointer}
  .top h2{font-size:19px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);font-weight:800}
  /* card */
  .card{background:linear-gradient(160deg,#173B2D,#102A20);border:1px solid rgba(201,168,76,.18);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.04)}
  .card.flat{background:var(--surf)}
  /* tiles */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
  .tile{position:relative;border:1px solid var(--border);border-radius:18px;cursor:pointer;
    padding:18px 14px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between;
    background:linear-gradient(155deg,#1B4D3E,#143A2D);transition:transform .12s ease,border-color .12s ease}
  .tile:hover{transform:translateY(-2px);border-color:var(--gold)}
  .tile:active{transform:translateY(0)}
  .tile .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#0F2A1E,#0A1A12);border:1px solid var(--gold)}
  .tile .ic svg{width:25px;height:25px}
  .tile .lab{font-size:14px;font-weight:700;line-height:1.25}
  .tile .sub{font-size:11px;color:var(--dim);margin-top:2px}
  /* accueil — tuiles premium (identiques au launcher) */
  .exh-tile{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .exh-tile:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.55)!important;box-shadow:0 7px 20px rgba(0,0,0,.45)!important}
  .exh-tile:active{transform:scale(.96)}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .btn.primary{background:linear-gradient(180deg,#F4DE9C 0%,#DCBB60 52%,#C9A84C 100%);color:#1a1607;text-transform:uppercase;letter-spacing:.05em;box-shadow:0 6px 22px rgba(201,168,76,.34), inset 0 1px 0 rgba(255,255,255,.45)}
  .btn.ghost{background:var(--surf);color:var(--text);border:1px solid var(--border)}
  .btn.line{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn.block{width:100%}
  .btn:active{filter:brightness(.94)}
  /* form */
  label.f{display:block;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin:0 0 6px 2px}
  .inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;
    padding:12px;color:var(--text);font-size:15px}
  .field{margin-bottom:13px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  /* list rows */
  .line{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
  .line:last-child{border-bottom:none}
  .line .k{color:var(--dim);font-size:13px}
  .line .v{font-size:14px;font-weight:600;text-align:right}
  /* belt chip */
  .belt{display:inline-flex;align-items:center;gap:8px;background:var(--surf);
    border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:700}
  .dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.35)}
  /* misc */
  .title-xl{font-size:26px;line-height:1.1}
  .center{text-align:center}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;
    background:var(--surf);border:1px solid var(--border);color:var(--dim)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--card);
    border:1px solid var(--gold);color:var(--text);padding:11px 18px;border-radius:12px;font-size:13px;
    z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:90%}
  .sync{position:fixed;top:calc(env(safe-area-inset-top) + 10px);right:12px;font-size:11px;color:var(--dim);
    background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:4px 10px;z-index:50}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  ::placeholder{color:#557}
  /* ---------- écran d'accueil / onboarding ---------- */
  #exhOnb{min-height:calc(100dvh - 132px);display:flex;flex-direction:column}
  #exhOnb .onb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  #exhOnb .onb-brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:.05em;color:var(--gold)}
  #exhOnb .onb-brand svg path{stroke:var(--gold);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  #exhOnb .onb-skip{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:6px}
  #exhOnb .onb-vp{flex:1;overflow:hidden;position:relative}
  #exhOnb .onb-track{display:flex;height:100%;transition:transform .42s cubic-bezier(.4,0,.2,1)}
  #exhOnb .onb-slide{min-width:100%;display:flex;flex-direction:column;justify-content:center;padding:6px 0}
  #exhOnb .onb-h1{font-size:29px;line-height:1.16;font-weight:800;letter-spacing:-.01em}
  #exhOnb .onb-h1 em{font-style:normal;color:var(--gold)}
  #exhOnb .onb-lead{margin-top:15px;font-size:16px;line-height:1.5;color:#E7EDE6}
  #exhOnb .onb-steps{margin-top:20px;display:flex;flex-direction:column;gap:13px}
  #exhOnb .onb-step{display:flex;gap:13px;align-items:flex-start}
  #exhOnb .onb-n{flex:none;width:33px;height:33px;border-radius:50%;background:rgba(201,168,76,.14);border:1.5px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  #exhOnb .onb-step b{display:block;font-size:15.5px}
  #exhOnb .onb-step span{font-size:13.5px;color:var(--dim)}
  #exhOnb .onb-ex .tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-weight:800}
  #exhOnb .onb-ex p{margin:8px 0 0;font-size:15.5px;line-height:1.5;color:var(--text)}
  #exhOnb .onb-forwho{font-size:16px;line-height:1.5;color:#E7EDE6}
  #exhOnb .onb-forwho b{color:var(--text)}
  #exhOnb .onb-dots{display:flex;gap:7px;justify-content:center;margin:16px 0}
  #exhOnb .onb-d{width:7px;height:7px;border-radius:50%;background:rgba(245,240,232,.25);transition:all .3s}
  #exhOnb .onb-d.on{width:22px;border-radius:4px;background:var(--gold)}
  #exhOnb .onb-have{display:block;width:100%;text-align:center;margin-top:12px;background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  #exhOnb .onb-illus{display:flex;justify-content:center;margin:0 0 6px}
  #exhOnb .onb-illus svg{width:100%;max-width:270px;height:auto}
  #exhOnb .onb-cap{text-align:center;font-size:14px;line-height:1.5;color:#E7EDE6;margin:0 0 16px}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="exhGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F8EBC2"/><stop offset="40%" stop-color="#E0C272"/><stop offset="72%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#9A7327"/></linearGradient>
  <linearGradient id="exhOrange" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F6B468"/><stop offset="100%" stop-color="#D9742A"/></linearGradient>

<script>
"use strict";
/* ============================================================================
   EX HOME v2 — application propre, sans compilation, un seul fichier.
   Principe : UNE fiche par cliente, UN seul endroit pour les mesures.
   Synchro : fusion (jamais d'écrasement), donc aucune perte de données.
   Backend : Supabase (table exhome_client_data), clés préfixées "v2:" pour
   ne JAMAIS toucher aux données de l'ancienne app.
============================================================================ */

/* ---------- Supabase ---------- */
var SB_URL = "https://tsvsoormwryatcouztrb.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdnNvb3Jtd3J5YXRjb3V6dHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzEwMzMsImV4cCI6MjA5ODA0NzAzM30.IoquMyBUZE6QrEQdIJGgHF80QukJdG_Rqucfkvm0iy4";
var REST = SB_URL + "/rest/v1/exhome_client_data";
var HJSON = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };

function cloudGet(key){
  return fetch(REST + "?client_id=eq." + encodeURIComponent(key) + "&select=payload", { headers: HJSON })
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(rows){ if(rows && rows[0]){ try{ return JSON.parse(rows[0].payload); }catch(e){ return null; } } return null; })
    .catch(function(){ return null; });
}
function cloudPut(key, payload){
  setSync("Enregistrement…");
  return fetch(REST, { method:"POST",
      headers: Object.assign({}, HJSON, { Prefer:"resolution=merge-duplicates,return=minimal" }),
      body: JSON.stringify({ client_id: key, payload: JSON.stringify(payload), updated_at: new Date().toISOString() }) })
    .then(function(){ setSync("Synchronisé ✓"); })
    .catch(function(){ setSync("Hors-ligne — sauvegardé sur l'appareil"); });
}
var syncT;
function setSync(msg){ var e=document.getElementById("sync"); if(!e) return; e.textContent=msg; e.style.display="block";
  clearTimeout(syncT); syncT=setTimeout(function(){ e.style.display="none"; }, 2600); }

var APP_VERSION = "build 46 · 1 juil. — encart ergoptimisation";

/* ---------- localStorage ---------- */
function readLS(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function writeLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

/* ---------- utils ---------- */
function today(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function genId(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function num(v){ var n=parseFloat(v); return isNaN(n)?null:n; }
function fmtDate(iso){ if(!iso) return ""; var p=String(iso).slice(0,10).split("-"); return p.length===3 ? p[2]+"/"+p[1]+"/"+p[0] : iso; }
function slugLogin(nom){ return nom.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g,"").trim().split(/\s+/).join("."); }

function resizePhoto(file, cb){ var reader=new FileReader(); reader.onload=function(){ var img=new Image(); img.onload=function(){ try{ var max=240,w=img.naturalWidth||img.width,h=img.naturalHeight||img.height; if(!w||!h){ cb(null); return; } var s=Math.min(1,max/Math.max(w,h)); var cw=Math.round(w*s),ch=Math.round(h*s); var cv=document.createElement("canvas"); cv.width=cw; cv.height=ch; cv.getContext("2d").drawImage(img,0,0,cw,ch); cb(cv.toDataURL("image/jpeg",0.72)); }catch(e){ cb(null); } }; img.onerror=function(){ cb(null); }; img.src=reader.result; }; reader.onerror=function(){ cb(null); }; reader.readAsDataURL(file); }
function avatarEl(c, size){ size=size||44; var d=el("div"); d.style.cssText="width:"+size+"px;height:"+size+"px;border-radius:50%;flex-shrink:0;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);font-size:"+Math.round(size*0.4)+"px;overflow:hidden"; if(c && c.photo){ d.style.backgroundImage="url("+c.photo+")"; d.style.backgroundSize="cover"; d.style.backgroundPosition="center"; } else { d.textContent=((c&&c.nom)||"?").trim().slice(0,1).toUpperCase(); } return d; }

/* ---------- ceintures (progression) ---------- */
var BELTS = [
  { n:"Blanche", c:"#F5F0E8", min:0 },
  { n:"Jaune",   c:"#E9D66B", min:7 },
  { n:"Orange",  c:"#E0852E", min:21 },
  { n:"Verte",   c:"#6FCF97", min:45 },
  { n:"Bleue",   c:"#5B8DEF", min:90 },
  { n:"Marron",  c:"#8B5A2B", min:150 },
  { n:"Noire",   c:"#2A2A2A", min:250 }
];
function belt(jours){ var b=BELTS[0]; for(var i=0;i<BELTS.length;i++){ if(jours>=BELTS[i].min) b=BELTS[i]; } return b; }
function nextBelt(jours){ for(var i=0;i<BELTS.length;i++){ if(jours<BELTS[i].min) return BELTS[i]; } return null; }

/* ---------- icônes ---------- */
var O = "url(#exhOrange)";
var ICONS = {
  compass:'<circle cx="12" cy="12" r="9"/><polygon points="15.5,8.5 11,11 8.5,15.5 13,13" fill="'+O+'" stroke="'+O+'"/>',
  dash:'<rect x="3.5" y="12" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="16.5" y="4" width="4" height="16" rx="1" fill="'+O+'" stroke="'+O+'"/>',
  user:'<circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"/>',
  posture:'<circle cx="12" cy="4.2" r="2"/><line x1="12" y1="6.2" x2="12" y2="13.5" stroke="'+O+'"/><line x1="12" y1="8.8" x2="8.5" y2="11.5"/><line x1="12" y1="8.8" x2="15.5" y2="11.5"/><line x1="12" y1="13.5" x2="9" y2="20"/><line x1="12" y1="13.5" x2="15" y2="20"/>',
  list:'<rect x="5" y="3.5" width="14" height="17" rx="2"/><path d="M9.5 3.5V2.5h5v1"/><line x1="8.5" y1="10" x2="15.5" y2="10"/><line x1="8.5" y1="14" x2="13.5" y2="14"/>',
  timer:'<circle cx="12" cy="13.5" r="7"/><line x1="12" y1="13.5" x2="12" y2="9.5"/><line x1="10" y1="3" x2="14" y2="3"/><line x1="12" y1="3" x2="12" y2="6.5"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="2" fill="'+O+'" stroke="'+O+'"/>',
  chart:'<path d="M4 4v16h16"/><polyline points="6,16 10,12 13,14.5 20,7"/><circle cx="20" cy="7" r="2" fill="'+O+'" stroke="'+O+'"/>',
  camera:'<rect x="3" y="7" width="18" height="13" rx="2.5"/><circle cx="12" cy="13.5" r="3.5"/><path d="M8.5 7l1.2-2.2h4.6L15.5 7"/>',
  heart:'<path d="M12 20s-7-4.3-7-9.3a3.8 3.8 0 0 1 7-2.2 3.8 3.8 0 0 1 7 2.2C19 15.7 12 20 12 20z" fill="'+O+'" fill-opacity="0.42"/>',
  food:'<line x1="8" y1="7" x2="8" y2="21"/><path d="M6 3v3.8M10 3v3.8M6 6.8c0 1.1.9 2 2 2s2-.9 2-2"/><path d="M16.5 3c-1.4 0-2.2 1.7-2.2 4.2s.8 3.4 2.2 3.4v10.4"/>',
  apple:'<path d="M12 8c-2-1.8-5-1.3-6 1-1.2 2.7 0 7 2 9 1 1 2 1.2 4 1.2s3-.2 4-1.2c2-2 3.2-6.3 2-9-1-2.3-4-2.8-6-1z"/><path d="M12 8c.2-2 1.5-3.2 3.3-3.4" stroke="'+O+'"/>',
  doc:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8.5 12.5l2.2 2.2 4-4.2" stroke="'+O+'"/>',
  drop:'<path d="M12 3.2s6 6.3 6 10.3a6 6 0 0 1-12 0C6 9.5 12 3.2 12 3.2z"/><path d="M9.3 14.2a2.7 2.7 0 0 0 2.7 2.7" stroke="'+O+'"/>',
  calendar:'<rect x="4" y="5" width="16" height="16" rx="2.5"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="9" y1="3" x2="9" y2="6"/><line x1="15" y1="3" x2="15" y2="6"/><circle cx="12" cy="14.5" r="1.9" fill="'+O+'" stroke="'+O+'"/>',
  chat:'<path d="M5 5.5h14a1.5 1.5 0 0 1 1.5 1.5v8a1.5 1.5 0 0 1-1.5 1.5H10l-4.5 4V7a1.5 1.5 0 0 1 1.5-1.5z"/>',
  search:'<circle cx="11" cy="11" r="6"/><line x1="15.5" y1="15.5" x2="20" y2="20"/>',

function maxMerge(a,b){ a=a||{}; b=b||{}; var o={}; Object.keys(a).forEach(function(k){o[k]=a[k];}); Object.keys(b).forEach(function(k){ o[k]=Math.max(o[k]||0,b[k]||0); }); return o; }
function unionBy(arr, keyFn){
  var map={};
  arr.forEach(function(x){ var k=keyFn(x); if(k==null) return; if(!(k in map) || (x._ts||0) >= (map[k]._ts||0)) map[k]=x; });
  return Object.keys(map).map(function(k){ return map[k]; });
}
/* fusion convergente d'une fiche : on ne perd jamais une entrée */
function mergeClient(a, b){
  if(!a) return b; if(!b) return a;
  var newer = (b._mtime||0) >= (a._mtime||0) ? b : a;
  var older = newer===b ? a : b;
  var m = Object.assign({}, older, newer);            // champs simples = côté le plus récent
  m.mesures   = unionBy((a.mesures||[]).concat(b.mesures||[]),   function(x){ return x.id; });
  m.objectifs = unionBy((a.objectifs||[]).concat(b.objectifs||[]),function(x){ return x.id; });
  m.joursReussis = Array.from(new Set((a.joursReussis||[]).concat(b.joursReussis||[]))).sort();
  m.sante = unionBy((a.sante||[]).concat(b.sante||[]), function(x){ return x.id; });
  m.journal = unionBy((a.journal||[]).concat(b.journal||[]), function(x){ return x.id; });
  m.programme = unionBy((a.programme||[]).concat(b.programme||[]), function(x){ return x.id; });
  m.seances = unionBy((a.seances||[]).concat(b.seances||[]), function(x){ return x.id; });
  m.messages = unionBy((a.messages||[]).concat(b.messages||[]), function(x){ return x.id; });
  m.petitsObjectifs = unionBy((a.petitsObjectifs||[]).concat(b.petitsObjectifs||[]), function(x){ return x.id; });
  m.poValid = Array.from(new Set((a.poValid||[]).concat(b.poValid||[]))).sort();
  m.chrono = { sessions: unionBy(((a.chrono&&a.chrono.sessions)||[]).concat((b.chrono&&b.chrono.sessions)||[]), function(x){ return x.id; }) };
  m.ergo = maxMerge(a.ergo, b.ergo);
  m.ergoSquat = maxMerge(a.ergoSquat, b.ergoSquat);
  m.ergoFente = maxMerge(a.ergoFente, b.ergoFente);
  m.ergoHinge = maxMerge(a.ergoHinge, b.ergoHinge);
  m.ergoEtages = maxMerge(a.ergoEtages, b.ergoEtages);
  m.hydra = maxMerge(a.hydra, b.hydra);

}
function ckey(id){ return "v2:c:" + id; }
function lkey(id){ return "exhome_v2_" + id; }

function loadClient(id){
  var local = readLS(lkey(id));
  return cloudGet(ckey(id)).then(function(cloud){
    var merged = mergeClient(local, cloud) || local || cloud;
    if(merged) writeLS(lkey(id), merged);
    return merged;
  }).catch(function(){ return local; });
}
/* sauvegarde durcie : relire le cloud, fusionner, écrire. JAMAIS d'écrasement à l'aveugle :
   si le réseau coupe, on garde en local + file d'attente, vidée automatiquement plus tard. */
var PKEY_PENDING="exhome_v2_pending";
function getPending(){ try{ return JSON.parse(localStorage.getItem(PKEY_PENDING)||"[]"); }catch(e){ return []; } }
function setPendingList(a){ try{ localStorage.setItem(PKEY_PENDING, JSON.stringify(a)); }catch(e){} }
function markPending(id){ var p=getPending(); if(p.indexOf(id)<0){ p.push(id); setPendingList(p); } }
function clearPending(id){ setPendingList(getPending().filter(function(x){ return x!==id; })); }
function pushClient(c){
  return cloudGet(ckey(c.id)).then(function(cloud){
    var merged = mergeClient(cloud, c); merged._mtime = Date.now();
    writeLS(lkey(merged.id), merged);
    return cloudPut(ckey(merged.id), merged).then(function(){ clearPending(merged.id); return merged; });
  });
}
function saveClient(c){
  c._mtime = Date.now();
  writeLS(lkey(c.id), c);
  return pushClient(c).catch(function(){ markPending(c.id); return c; });
}
function flushPending(){
  var p=getPending(); if(!p.length) return Promise.resolve();
  return Promise.all(p.map(function(id){
    var local=readLS(lkey(id)); if(!local){ clearPending(id); return Promise.resolve(); }
    return pushClient(local).catch(function(){});
  }));
}
/* ---- rafraîchissement automatique des écrans partagés ---- */
var __view=null, __lastSig={}, __chronoRunning=false;
function setView(id, isSelf, run){ __view={ id:id, isSelf:isSelf, run:run }; }
function viewSig(c){ return [c._mtime||0,(c.mesures||[]).length,(c.sante||[]).length,((c.chrono||{}).sessions||[]).length,(c.joursReussis||[]).length].join("|"); }
function autoRefresh(){
  if(typeof document!=="undefined" && document.hidden) return;
  if(__chronoRunning){ flushPending(); return; }
  var ae=document.activeElement; if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)){ flushPending(); return; }
  flushPending();
  var v=__view; if(!v) return;
  loadClient(v.id).then(function(c){
    if(!c || !__view || __view.id!==v.id) return;
    var sig=viewSig(c);
    if(!(v.id in __lastSig)){ __lastSig[v.id]=sig; return; }
    if(__lastSig[v.id]===sig) return;
    __lastSig[v.id]=sig; try{ v.run(c); }catch(e){}
  }).catch(function(){});
}
if(typeof document!=="undefined"){
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) autoRefresh(); });
  window.addEventListener("focus", autoRefresh);
  setInterval(autoRefresh, 20000);
}

function loadRoster(){
  var local = readLS("exhome_v2_roster") || { clients:[], _mtime:0 };
  return cloudGet(RKEY).then(function(cloud){
    var merged = mergeRoster(local, cloud);
    writeLS("exhome_v2_roster", merged);
    return merged;
  }).catch(function(){ return local; });
}
function mergeRoster(a,b){
  if(!a) return b; if(!b) return a;
  var clients = unionBy((a.clients||[]).concat(b.clients||[]), function(x){ return x.id; });
  return { clients:clients, _mtime:Math.max(a._mtime||0,b._mtime||0) };
}
function saveRoster(r){
  r._mtime = Date.now(); writeLS("exhome_v2_roster", r);
  return cloudGet(RKEY).then(function(cloud){
    var merged = mergeRoster(cloud, r); merged._mtime=Date.now();
    writeLS("exhome_v2_roster", merged);
    return cloudPut(RKEY, merged).then(function(){ return merged; });
  }).catch(function(){ return cloudPut(RKEY, r).then(function(){ return r; }); });
}

function sparkline(vals, color){
  if(vals.length<2) return "";
  var W=320,H=90,pad=8;
  var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals); if(max===min){ max=min+1; min=min-1; }
  var pts=vals.map(function(v,i){ var x=pad+(W-2*pad)*i/(vals.length-1); var y=pad+(H-2*pad)*(1-(v-min)/(max-min)); return [x,y]; });
  var line=pts.map(function(p,i){ return (i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1); }).join(" ");
  var area="M"+pts[0][0].toFixed(1)+" "+(H-pad)+" "+pts.map(function(p){return "L"+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ")+" L"+pts[pts.length-1][0].toFixed(1)+" "+(H-pad)+" Z";
  var dots=pts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.4" fill="'+color+'"/>';}).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block"><path d="'+area+'" fill="'+color+'" opacity="0.12"/><path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';
}
function barWeek(map, goal, color){
  map=map||{}; var days=[]; var JL=["D","L","M","M","J","V","S"];
  for(var i=6;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); days.push({v:map[key]||0,lab:JL[d.getDay()]}); }
  var max=Math.max(goal||0, Math.max.apply(null,days.map(function(x){return x.v;})), 1);
  var W=320,H=104,pad=14,gap=(W-2*pad)/7,bw=gap*0.58,base=H-20,top=14;
  var goalY=base-(base-top)*(goal/max);
  var goalLine=goal? '<line x1="'+pad+'" y1="'+goalY.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+goalY.toFixed(1)+'" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>':"";
  var bars=days.map(function(x,i){ var h=(base-top)*(x.v/max); var bx=pad+gap*i+(gap-bw)/2; var by=base-h;
    return '<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,h).toFixed(1)+'" rx="3" fill="'+color+'"/>'
      +'<text x="'+(bx+bw/2).toFixed(1)+'" y="'+(H-5)+'" text-anchor="middle" font-size="9" fill="#7FA88B">'+x.lab+'</text>'
      +(x.v?'<text x="'+(bx+bw/2).toFixed(1)+'" y="'+(by-3).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#F5F0E8">'+x.v+'</text>':''); }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+goalLine+bars+'</svg>';
}

function signaturePad(initial){
  var box=el("div"); box.style.cssText="border:1px solid var(--border);border-radius:12px;background:#0c1f17;overflow:hidden";
  var cv=document.createElement("canvas"); cv.style.cssText="width:100%;height:130px;display:block;touch-action:none;cursor:crosshair"; box.appendChild(cv);
  var ctx=cv.getContext("2d"); var drawing=false,last=null,dirty=false;
  function fit(){ var r=cv.getBoundingClientRect(); cv.width=Math.max(260,r.width|0); cv.height=130; ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#F5F0E8"; if(initial){ var img=new Image(); img.onload=function(){ ctx.drawImage(img,0,0,cv.width,cv.height); }; img.src=initial; } }
  function pos(e){ var r=cv.getBoundingClientRect(); var t=(e.touches&&e.touches[0])?e.touches[0]:e; return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; }
  function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
  function move(e){ if(!drawing)return; var p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; dirty=true; e.preventDefault(); }
  function end(){ drawing=false; }
  cv.addEventListener("mousedown",start); cv.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
  cv.addEventListener("touchstart",start,{passive:false}); cv.addEventListener("touchmove",move,{passive:false}); cv.addEventListener("touchend",end);
  setTimeout(fit,40);
  return { el:box, clear:function(){ ctx.clearRect(0,0,cv.width,cv.height); dirty=false; }, data:function(){ return dirty? cv.toDataURL("image/png") : (initial||""); } };
}

function nutriScoreBadge(g){ g=(g||"").toUpperCase(); var C={A:"#038141",B:"#85BB2F",C:"#FECB02",D:"#EE8100",E:"#E63E11"}; if(!C[g]) return ""; return '<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:'+C[g]+';color:#fff;font-weight:800;font-size:13px">'+g+'</span>'; }

function offSearch(q){
  var url="https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=20&fields=code,product_name,product_name_fr,brands,image_front_small_url,nutriments,nutriscore_grade,nova_group,quantity";
  return fetch(url).then(function(r){return r.json();}).then(function(d){
    var arr=(d&&d.products)||[];
    return arr.map(function(p){ var n=p.nutriments||{}; var kcal=n["energy-kcal_100g"]; if(kcal==null&&n["energy_100g"]!=null) kcal=n["energy_100g"]/4.184; var nom=((p.product_name_fr||p.product_name||"").trim()); if(!nom) return null;
      return { code:p.code, nom:nom, brand:((p.brands||"").split(",")[0]||"").trim(), image:p.image_front_small_url||"", kcal:Math.round(kcal||0), p:+(n.proteins_100g||0), g:+(n.carbohydrates_100g||0), l:+(n.fat_100g||0), nutriscore:(p.nutriscore_grade||"").toUpperCase(), nova:p.nova_group||null, quantity:(p.quantity||"").trim() };
    }).filter(function(x){ return x && x.kcal>0; });
  });
}

    var ki=input("",{placeholder:"sk-ant-…"}); var kb=el("button","btn primary block","Enregistrer la clé"); kb.style.marginTop="4px";
    k.appendChild(field("Clé API Anthropic", ki)); k.appendChild(kb); app.appendChild(k);
    kb.onclick=function(){ var v=(ki.value||"").trim(); if(v.indexOf("sk-ant")!==0){ toast("Clé invalide (sk-ant-…)."); return; } try{ localStorage.setItem("v2_ai_key",v); }catch(e){} toast("Clé enregistrée"); openFoodAI(c,isSelf); };
    return;
  }
  app.appendChild(el("div","muted","Prends ou choisis une photo de ton repas : l'IA identifie les aliments et estime calories et macros. Tu valides ensuite ce que tu ajoutes."));
  var fileIn=document.createElement("input"); fileIn.type="file"; fileIn.accept="image/*"; fileIn.style.display="none"; app.appendChild(fileIn);
  var pick=el("button","btn primary block","📸 Choisir une photo de repas"); pick.style.margin="12px 0"; app.appendChild(pick);
  var status=el("div","muted"); status.style.cssText="font-size:13px;margin-bottom:10px"; app.appendChild(status);
  var prev=document.createElement("img"); prev.style.cssText="width:100%;max-height:220px;object-fit:contain;border-radius:12px;border:1px solid var(--border);display:none;margin-bottom:12px"; app.appendChild(prev);
  var out=el("div"); app.appendChild(out);
  var resetK=el("button","btn ghost block","Changer / supprimer la clé IA"); resetK.style.marginTop="22px"; resetK.onclick=function(){ try{ localStorage.removeItem("v2_ai_key"); }catch(e){} toast("Clé supprimée"); openFoodAI(c,isSelf); }; app.appendChild(resetK);
  pick.onclick=function(){ fileIn.click(); };
  fileIn.onchange=function(){ var f=this.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ prev.src=rd.result; prev.style.display="block"; var b64=(""+rd.result).split(",")[1]; var mt=(f.type&&f.type.indexOf("image/")===0)?f.type:"image/jpeg"; analyze(b64,mt); }; rd.readAsDataURL(f); };
  function analyze(b64,mt){
    status.textContent="Analyse de la photo par l'IA…"; out.innerHTML="";
    var prompt="Identifie les aliments visibles dans cette photo de repas. Reponds UNIQUEMENT en JSON, sans texte autour, au format: {\"items\":[{\"nom\":\"...\",\"grammes\":120,\"kcal\":210,\"prot\":8,\"gluc\":30,\"lip\":6}]}. Estime des portions realistes ; kcal et macros pour la portion indiquee (pas pour 100 g).";
    var body={ model:"claude-sonnet-4-6", max_tokens:1024, messages:[{ role:"user", content:[ {type:"image",source:{type:"base64",media_type:mt,data:b64}}, {type:"text",text:prompt} ] }] };
    fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{ "content-type":"application/json", "x-api-key":aiKey(), "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" }, body:JSON.stringify(body) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d&&d.error){ status.innerHTML='<span style="color:var(--orange)">Erreur IA : '+esc(d.error.message||"vérifie la clé")+'</span>'; return; }
        var txt=((d.content||[]).map(function(x){ return x.type==="text"?x.text:""; }).join("")).trim();
        var mm=txt.match(/\{[\s\S]*\}/); var data=null; try{ data=JSON.parse(mm?mm[0]:txt); }catch(e){}
        if(!data||!data.items||!data.items.length){ status.textContent="Aucun aliment identifié. Réessaie avec une photo plus nette."; return; }
        status.textContent="✓ "+data.items.length+" aliment(s) identifié(s) — ajoute ce que tu veux :";
        data.items.forEach(function(it){
          var card=el("div","card");
          card.innerHTML='<div style="font-weight:700">'+esc(it.nom||"Aliment")+'</div><div class="muted" style="font-size:13px;margin-top:4px">≈ '+(it.grammes||0)+' g · '+(it.kcal||0)+' kcal · P'+fr1(it.prot||0)+' G'+fr1(it.gluc||0)+' L'+fr1(it.lip||0)+'</div>';
          var sel=el("select","inp"); sel.style.marginTop="10px"; MEALS.forEach(function(meal){ var o=document.createElement("option"); o.value=meal; o.textContent=meal; sel.appendChild(o); }); card.appendChild(sel);
          var ab=el("button","btn primary block","Ajouter au journal"); ab.style.marginTop="8px"; card.appendChild(ab);
          ab.onclick=function(){ var e={id:genId(),date:today(),meal:sel.value,nom:it.nom||"Aliment",qty:it.grammes||0,unit:"g",kcal:Math.round(it.kcal||0),p:fr1(it.prot||0),g:fr1(it.gluc||0),l:fr1(it.lip||0),_ts:Date.now()}; c.journal=(c.journal||[]).concat([e]); ab.disabled=true; ab.textContent="✓ Ajouté"; saveClient(c).then(function(m){ Object.assign(c,m); }); };
          out.appendChild(card);
        });
      })
      .catch(function(){ status.innerHTML='<span style="color:var(--orange)">Connexion impossible à l\'IA. Vérifie ta clé et ta connexion.</span>'; });
  }
}

function mesVar(f, cur, prev){
  if(prev==null||cur==null) return null;
  var d=Math.round((cur-prev)*10)/10, col;
  if(d===0){ col="var(--dim)"; }
  else if(f.low===null||typeof f.low==="undefined"){ col="var(--gold)"; }
  else { var good=(f.low? d<0 : d>0); col=good?"var(--ok)":"var(--orange)"; }
  return { d:d, col:col, txt:(d>0?"+":"")+d };
}
function mesuresEncart(c, isSelf){
  var mes=visibleMes(c);
  var card=el("div","card");
  card.appendChild(el("div","eyebrow","Mes mesures"));
  if(!mes.length){
    var p=el("div","muted"); p.style.cssText="font-size:13px;margin:6px 0 10px"; p.textContent="Aucune mesure encore. Ajoute ta première pesée."; card.appendChild(p);
    var b=el("button","btn primary block","+ Ajouter une mesure"); b.onclick=function(){ mesureForm(c,isSelf,null); }; card.appendChild(b);
    return card;
  }
  var last=mes[0], prev=mes[1]||null;
  var dl=el("div","muted"); dl.style.cssText="font-size:11px;margin:4px 0 10px"; dl.textContent="Dernière pesée : "+fmtDate(last.date); card.appendChild(dl);
  var grid=el("div"); grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:10px";
  ["poids","graisse","muscle","eau"].forEach(function(k){
    var f=MES_FIELDS.filter(function(x){return x.k===k;})[0]; if(!f||last[f.k]==null) return;
    var v=mesVar(f, last[f.k], prev?prev[f.k]:null);
    var cell=el("div"); cell.style.cssText="background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:11px 12px";
    cell.innerHTML='<div class="muted" style="font-size:11px">'+f.emoji+' '+f.lab+'</div>'
      +'<div style="font-size:20px;font-weight:800;color:'+f.col+';margin-top:3px">'+last[f.k]+'<span style="font-size:11px;font-weight:600;color:var(--dim)"> '+f.u+'</span></div>'
      +(v?'<div style="font-size:11px;font-weight:700;color:'+v.col+';margin-top:2px">'+v.txt+' '+f.u+'</div>':'<div style="font-size:11px;color:var(--dim);margin-top:2px">—</div>');
    grid.appendChild(cell);
  });
  card.appendChild(grid);
  var more=el("button","btn ghost block","+ Toutes les mesures & comparaison"); more.style.marginTop="12px"; more.onclick=function(){ screenMesures(c,isSelf); }; card.appendChild(more);
  return card;
}
function importMeasures(b64, mt, inputs, status){
  var keys=MES_FIELDS.map(function(f){return f.k;});
  var prompt="Voici une photo d'un pèse-personne à impédance ou une capture de son application. Extrais les valeurs numériques. Réponds UNIQUEMENT en JSON avec ces clés (mets null si absent) : "+keys.join(", ")+". Donne uniquement des nombres, sans unités.";
  var body={ model:"claude-sonnet-4-6", max_tokens:700, messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:prompt}]}] };
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":aiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)})
  .then(function(r){return r.json();}).then(function(d){
    if(d&&d.error){ status.innerHTML='<span style="color:var(--orange)">Erreur IA : '+esc(d.error.message||"vérifie la clé")+'</span>'; return; }
    var txt=((d.content||[]).map(function(x){return x.type==="text"?x.text:"";}).join("")).trim();
    var mm=txt.match(/\{[\s\S]*\}/); var data=null; try{ data=JSON.parse(mm?mm[0]:txt); }catch(e){}
    if(!data){ status.textContent="Lecture impossible. Réessaie avec une image plus nette."; return; }
    var n=0; MES_FIELDS.forEach(function(f){ var val=data[f.k]; if(val!=null && val!=="" && !isNaN(+val)){ inputs[f.k].value=+val; n++; } });
    status.innerHTML = n? '<span style="color:var(--ok)">✓ '+n+' mesure(s) pré-remplie(s) — vérifie puis enregistre.</span>' : 'Aucune valeur lisible trouvée.';
  }).catch(function(){ status.innerHTML='<span style="color:var(--orange)">Connexion impossible à l\'IA.</span>'; });
}

/* ---------- démarrage ---------- */
render();
</script>
