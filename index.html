 30s par c\xF4t\xE9, 3 s\xE9ries."},{titre:"Renforcement lombaire \u2013 bird-dog",duree:10,description:"\xC0 quatre pattes, tendre bras droit + jambe gauche simultan\xE9ment. 10 r\xE9p. chaque c\xF4t\xE9."}],mobilite:[{titre:"Rotation cervicale lente",duree:3,description:"Tourner lentement la t\xEAte gauche-droite, 5 fois de chaque c\xF4t\xE9. Respiration continue."},{titre:"Ouverture des hanches \u2013 figure 4",duree:8,description:"Allong\xE9 sur le dos, croiser la cheville droite sur la cuisse gauche, tirer vers soi. 45s par c\xF4t\xE9."},{titre:"Rotation thoracique assis",duree:5,description:"Assis sur un tabouret, croiser les bras sur les \xE9paules, tourner le buste \xE0 droite et \xE0 gauche. 10 r\xE9p."},{titre:"Mobilisation chevilles \u2013 cercles",duree:3,description:"Assis, faire des grands cercles avec les pieds dans les deux sens. 10 fois chaque direction."},{titre:"\xC9tirement ischios \u2013 hamstrings debout",duree:5,description:"Debout, poser le talon sur une chaise, garder le dos droit et pencher l\xE9g\xE8rement le buste en avant."},{titre:"Ouverture \xE9paules \u2013 Eagle arms",duree:4,description:"Enrouler les bras l'un autour de l'autre \xE0 hauteur d'\xE9paule. Lever les coudes. 30s par c\xF4t\xE9."},{titre:"Squat assis-debout lent",duree:6,description:"S'asseoir et se lever d'une chaise en 4 temps, sans utiliser les mains. 10 r\xE9p\xE9titions."}],force:[{titre:"Gainage ventral \u2013 3 s\xE9ries",duree:10,description:"Position planche sur avant-bras. Tenir 30s, 3 s\xE9ries avec 30s de repos."},{titre:"Pont fessier",duree:8,description:"Allong\xE9 sur le dos, pieds \xE0 plat, soulever le bassin jusqu'\xE0 aligner hanches et \xE9paules. 15 r\xE9p, 3 s\xE9ries."},{titre:"Squat au poids du corps",duree:10,description:"Pieds \xE0 la largeur des \xE9paules, descendre comme pour s'asseoir. 15 r\xE9p\xE9titions, 3 s\xE9ries."},{titre:"Pompes sur les genoux",duree:8,description:"Mains au sol largeur \xE9paules, genoux pos\xE9s. Fl\xE9chir les coudes jusqu'\xE0 effleurer le sol. 10 r\xE9p, 3 s\xE9ries."},{titre:"Fentes avant altern\xE9es",duree:10,description:"Pas en avant, fl\xE9chir les deux genoux \xE0 90\xB0, revenir. 10 r\xE9p par jambe, 3 s\xE9ries."},{titre:"Superman dorsal",duree:6,description:"\xC0 plat ventre, lever simultan\xE9ment les bras et les jambes. Tenir 3s, 10 r\xE9p\xE9titions."},{titre:"Step-up sur marche",duree:8,description:"Monter et descendre d'une marche en alternant les jambes. 20 r\xE9p\xE9titions, 3 s\xE9ries."}],respiration:[{titre:"Coh\xE9rence cardiaque 5-5",duree:5,description:"Inspirer 5 secondes, expirer 5 secondes. 6 cycles par minute pendant 5 minutes."},{titre:"Respiration abdominale profonde",duree:5,description:"Main sur le ventre, gonfler le ventre \xE0 l'inspiration, d\xE9gonfler \xE0 l'expiration. 10 cycles."},{titre:"Respiration 4-7-8 (anti-stress)",duree:5,description:"Inspirer 4s, retenir 7s, expirer lentement 8s. 4 cycles. Puissant avant le coucher."},{titre:"Scan corporel + respiration",duree:10,description:"Allong\xE9, parcourir chaque partie du corps en la rel\xE2chant consciemment avec l'expiration."},{titre:"Box breathing (militaire)",duree:5,description:"Inspirer 4s, retenir 4s, expirer 4s, retenir 4s. 6 cycles. Id\xE9al avant un moment stressant."},{titre:"Respiration altern\xE9e des narines",duree:5,description:"Fermer la narine droite, inspirer \xE0 gauche. Fermer la gauche, expirer \xE0 droite. 5 cycles."}],menager:[{titre:"Vaisselle \xE0 la main \u2013 Relev\xE9s de talons",duree:15,description:"Pendant la vaisselle : relev\xE9s de talons altern\xE9s toutes les 2 min. Pieds parall\xE8les, genoux d\xE9verrouill\xE9s. Renforce mollets et p\xE9rin\xE9e."},{titre:"Vaisselle \xE0 la main \u2013 \xC9quilibre unipodal",duree:15,description:"Tenir sur une jambe 30s en faisant la vaisselle, alterner. Renforce proprioception, cheville et stabilisateurs du genou."},{titre:"Vaisselle \xE0 la main \u2013 Gainage debout",duree:15,description:"Contracter abdominaux et fessiers en expirant toutes les 2 min. Maintenir 10s. Posture colonne neutre contre l'\xE9vier."},{titre:"Pr\xE9paration des repas \u2013 Station ergonomique",duree:20,description:"Pieds parall\xE8les, genoux fl\xE9chis 5\xB0, planche \xE0 hauteur des coudes. Transfert de poids d'une jambe \xE0 l'autre toutes les 30s. Renforce stabilit\xE9 posturale."},{titre:"Pr\xE9paration des repas \u2013 Squats entre \xE9tapes",duree:20,description:"Entre chaque \xE9tape de la recette (pendant que \xE7a cuit, bout, etc.) : 10 squats lents au poids du corps. Cuisses, fessiers, dos."},{titre:"Remplir / vider le lave-vaisselle \u2013 Squat profond",duree:10,description:"Chaque plat en bas = squat profond dos droit (pas flexion lombaire). Chaque rangement en haut = \xE9l\xE9vation sur pointes + gainage \xE9paules."},{titre:"Remplir / vider le lave-vaisselle \u2013 Hinge hip",duree:10,description:"Pour charger le bas du lave-vaisselle : hinge strict (charni\xE8re hanche, dos neutre). Renforce ischios-jambiers et \xE9recteurs du rachis."},{titre:"Ranger les courses \u2013 Farmer's walk",duree:15,description:"Porter les sacs comme un farmer's walk : abdos engag\xE9s, \xE9paules basses et dans l'axe, pas r\xE9guliers. Renforce trap\xE8zes, abdos, avant-bras."},{titre:"Ranger les courses \u2013 Squats avec charge",duree:10,description:"Avant de ranger : 5 squats lents avec les packs d'eau ou sacs de courses. Charge fonctionnelle, renforce quadriceps et fessiers."},{titre:"Vider les poubelles \u2013 Hinge & portage",duree:5,description:"Saisir le sac en hinge (dos droit, pouss\xE9e par les talons). Porter en gainage actif jusqu'au bac. Renforce cha\xEEne post\xE9rieure et core."},{titre:"Passer l'aspirateur \u2013 Fentes altern\xE9es",duree:20,description:"Avancer en fente \xE0 chaque pouss\xE9e : jambe avant 90\xB0, jambe arri\xE8re tendue, dos droit. Alterner droite/gauche. Renforce quadriceps, fessiers, ischios."},{titre:"Passer l'aspirateur \u2013 Pivot des hanches",duree:20,description:"Pivoter sur les pieds (pas tordre la colonne) \xE0 chaque changement de direction. Renforce mobilit\xE9 rotateurs de hanche et stabilit\xE9 lombaire."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Fentes lat\xE9rales",duree:20,description:"Chaque passage large = fente lat\xE9rale : jambe portante fl\xE9chie, jambe oppos\xE9e tendue. Renforce adducteurs, abducteurs, fessiers."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Gainage de marche",duree:20,description:"Serrer les abdominaux et contracter les fessiers \xE0 chaque pas. Maintenir la colonne neutre tout le long. Endurance musculaire posturale."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Cross-body",duree:20,description:"\xC0 quatre pattes : alterner bras droit + jambe gauche tendus (bird-dog) entre chaque mouvement de lavage. Renforce gainage profond et coordination."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Agenouillement contr\xF4l\xE9",duree:15,description:"Descendre en fente contr\xF4l\xE9e (4 temps), poser genou doucement, remonter en poussant sur le talon. Renforce quadriceps, contr\xF4le excentrique."},{titre:"Nettoyer les plinthes \u2013 Squat maintenu",duree:10,description:"Travailler en position squat isom\xE9trique (cuisses parall\xE8les au sol) pour nettoyer les plinthes. Renforce quadriceps et stabilit\xE9 du genou."},{titre:"\xC9tendre le linge \u2013 \xC9l\xE9vation scapulaire",duree:15,description:"Pour chaque pi\xE8ce suspendue : \xE9lever les bras en gardant omoplates basses et rapproch\xE9es. Pas de compensation cervicale. Renforce dentel\xE9, trap\xE8zes."},{titre:"\xC9tendre le linge \u2013 Relev\xE9s de genoux",duree:15,description:"Entre chaque pi\xE8ce : 5 relev\xE9s de genoux altern\xE9s (marche sur place haute). Renforce psoas, core, coordination cardio l\xE9g\xE8re."},{titre:"Plier le linge \u2013 Squat maintenu",duree:15,description:"Plier chaque pi\xE8ce en position squat isom\xE9trique (cuisses \xE0 90\xB0). Descendre, plier, remonter. Renforce quadriceps, fessiers, endurance jambes."},{titre:"Trier le linge \u2013 Hinge r\xE9p\xE9t\xE9",duree:10,description:"Pour ramasser chaque pi\xE8ce au sol : hinge strict dos neutre, pouss\xE9e par talons. R\xE9p\xE9t\xE9 15-20 fois = s\xE9rie de Romanian Deadlift fonctionnel."},{titre:"Repasser \u2013 Station debout active",duree:30,description:"Transfert de poids jambe \xE0 jambe toutes les 30s. Relev\xE9s de talons toutes les 3 min. Gainage actif en repassant. Mobilit\xE9 cheville et endurance posturale."},{titre:"Repasser \u2013 Fentes sur place",duree:30,description:"En repassant de grandes pi\xE8ces (draps, nappes) : avancer en fente \xE0 chaque passage. Renforce quadriceps, fessiers, travail cardiovasculaire l\xE9ger."},{titre:"Ranger le linge dans les armoires \u2013 Squat + \xE9l\xE9vation",duree:10,description:"Prendre une pile du bas en squat, ranger en haut = \xE9l\xE9vation bras contr\xF4l\xE9e (\xE9paules stables). Encha\xEEner 10 fois. Circuit fonctionnel complet."},{titre:"D\xE9poussi\xE9rer les meubles \u2013 Mobilisation \xE9paules",duree:15,description:"Mouvements circulaires larges avec le chiffon : activer toute l'amplitude de l'\xE9paule, omoplate basse. Renforce coiffe des rotateurs et mobilit\xE9 thoracique."},{titre:"Nettoyer les vitres / miroirs \u2013 \xC9l\xE9vation bras tendu",duree:15,description:"Grands cercles et mouvements en 8 avec le bras tendu. Gainage actif pendant les mouvements hauts. Renforce \xE9paule, triceps, core."},{titre:"Nettoyer les surfaces hautes \u2013 Pointes de pieds",duree:10,description:"Pour atteindre en hauteur : monter sur pointes de pieds lentement (3 temps), tenir 2s, redescendre (3 temps). 10 fois = renforcement mollets, \xE9quilibre."},{titre:"Ranger les placards bas \u2013 Squat profond r\xE9p\xE9t\xE9",duree:15,description:"Chaque objet rang\xE9 en bas = squat profond. Chaque retrait = squat + hinge selon la position. 15-20 r\xE9p\xE9titions spontan\xE9es = s\xE9ance jambes."},{titre:"Ranger les
