ries."},{titre:"Fentes avant altern\xE9es",duree:10,description:"Pas en avant, fl\xE9chir les deux genoux \xE0 90\xB0, revenir. 10 r\xE9p par jambe, 3 s\xE9ries."},{titre:"Superman dorsal",duree:6,description:"\xC0 plat ventre, lever simultan\xE9ment les bras et les jambes. Tenir 3s, 10 r\xE9p\xE9titions."},{titre:"Step-up sur marche",duree:8,description:"Monter et descendre d'une marche en alternant les jambes. 20 r\xE9p\xE9titions, 3 s\xE9ries."}],respiration:[{titre:"Coh\xE9rence cardiaque 5-5",duree:5,description:"Inspirer 5 secondes, expirer 5 secondes. 6 cycles par minute pendant 5 minutes."},{titre:"Respiration abdominale profonde",duree:5,description:"Main sur le ventre, gonfler le ventre \xE0 l'inspiration, d\xE9gonfler \xE0 l'expiration. 10 cycles."},{titre:"Respiration 4-7-8 (anti-stress)",duree:5,description:"Inspirer 4s, retenir 7s, expirer lentement 8s. 4 cycles. Puissant avant le coucher."},{titre:"Scan corporel + respiration",duree:10,description:"Allong\xE9, parcourir chaque partie du corps en la rel\xE2chant consciemment avec l'expiration."},{titre:"Box breathing (militaire)",duree:5,description:"Inspirer 4s, retenir 4s, expirer 4s, retenir 4s. 6 cycles. Id\xE9al avant un moment stressant."},{titre:"Respiration altern\xE9e des narines",duree:5,description:"Fermer la narine droite, inspirer \xE0 gauche. Fermer la gauche, expirer \xE0 droite. 5 cycles."}],menager:[{titre:"Vaisselle \xE0 la main \u2013 Relev\xE9s de talons",duree:15,description:"Pendant la vaisselle : relev\xE9s de talons altern\xE9s toutes les 2 min. Pieds parall\xE8les, genoux d\xE9verrouill\xE9s. Renforce mollets et p\xE9rin\xE9e."},{titre:"Vaisselle \xE0 la main \u2013 \xC9quilibre unipodal",duree:15,description:"Tenir sur une jambe 30s en faisant la vaisselle, alterner. Renforce proprioception, cheville et stabilisateurs du genou."},{titre:"Vaisselle \xE0 la main \u2013 Gainage debout",duree:15,description:"Contracter abdominaux et fessiers en expirant toutes les 2 min. Maintenir 10s. Posture colonne neutre contre l'\xE9vier."},{titre:"Pr\xE9paration des repas \u2013 Station ergonomique",duree:20,description:"Pieds parall\xE8les, genoux fl\xE9chis 5\xB0, planche \xE0 hauteur des coudes. Transfert de poids d'une jambe \xE0 l'autre toutes les 30s. Renforce stabilit\xE9 posturale."},{titre:"Pr\xE9paration des repas \u2013 Squats entre \xE9tapes",duree:20,description:"Entre chaque \xE9tape de la recette (pendant que \xE7a cuit, bout, etc.) : 10 squats lents au poids du corps. Cuisses, fessiers, dos."},{titre:"Remplir / vider le lave-vaisselle \u2013 Squat profond",duree:10,description:"Chaque plat en bas = squat profond dos droit (pas flexion lombaire). Chaque rangement en haut = \xE9l\xE9vation sur pointes + gainage \xE9paules."},{titre:"Remplir / vider le lave-vaisselle \u2013 Hinge hip",duree:10,description:"Pour charger le bas du lave-vaisselle : hinge strict (charni\xE8re hanche, dos neutre). Renforce ischios-jambiers et \xE9recteurs du rachis."},{titre:"Ranger les courses \u2013 Farmer's walk",duree:15,description:"Porter les sacs comme un farmer's walk : abdos engag\xE9s, \xE9paules basses et dans l'axe, pas r\xE9guliers. Renforce trap\xE8zes, abdos, avant-bras."},{titre:"Ranger les courses \u2013 Squats avec charge",duree:10,description:"Avant de ranger : 5 squats lents avec les packs d'eau ou sacs de courses. Charge fonctionnelle, renforce quadriceps et fessiers."},{titre:"Vider les poubelles \u2013 Hinge & portage",duree:5,description:"Saisir le sac en hinge (dos droit, pouss\xE9e par les talons). Porter en gainage actif jusqu'au bac. Renforce cha\xEEne post\xE9rieure et core."},{titre:"Passer l'aspirateur \u2013 Fentes altern\xE9es",duree:20,description:"Avancer en fente \xE0 chaque pouss\xE9e : jambe avant 90\xB0, jambe arri\xE8re tendue, dos droit. Alterner droite/gauche. Renforce quadriceps, fessiers, ischios."},{titre:"Passer l'aspirateur \u2013 Pivot des hanches",duree:20,description:"Pivoter sur les pieds (pas tordre la colonne) \xE0 chaque changement de direction. Renforce mobilit\xE9 rotateurs de hanche et stabilit\xE9 lombaire."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Fentes lat\xE9rales",duree:20,description:"Chaque passage large = fente lat\xE9rale : jambe portante fl\xE9chie, jambe oppos\xE9e tendue. Renforce adducteurs, abducteurs, fessiers."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Gainage de marche",duree:20,description:"Serrer les abdominaux et contracter les fessiers \xE0 chaque pas. Maintenir la colonne neutre tout le long. Endurance musculaire posturale."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Cross-body",duree:20,description:"\xC0 quatre pattes : alterner bras droit + jambe gauche tendus (bird-dog) entre chaque mouvement de lavage. Renforce gainage profond et coordination."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Agenouillement contr\xF4l\xE9",duree:15,description:"Descendre en fente contr\xF4l\xE9e (4 temps), poser genou doucement, remonter en poussant sur le talon. Renforce quadriceps, contr\xF4le excentrique."},{titre:"Nettoyer les plinthes \u2013 Squat maintenu",duree:10,description:"Travailler en position squat isom\xE9trique (cuisses parall\xE8les au sol) pour nettoyer les plinthes. Renforce quadriceps et stabilit\xE9 du genou."},{titre:"\xC9tendre le linge \u2013 \xC9l\xE9vation scapulaire",duree:15,description:"Pour chaque pi\xE8ce suspendue : \xE9lever les bras en gardant omoplates basses et rapproch\xE9es. Pas de compensation cervicale. Renforce dentel\xE9, trap\xE8zes."},{titre:"\xC9tendre le linge \u2013 Relev\xE9s de genoux",duree:15,description:"Entre chaque pi\xE8ce : 5 relev\xE9s de genoux altern\xE9s (marche sur place haute). Renforce psoas, core, coordination cardio l\xE9g\xE8re."},{titre:"Plier le linge \u2013 Squat maintenu",duree:15,description:"Plier chaque pi\xE8ce en position squat isom\xE9trique (cuisses \xE0 90\xB0). Descendre, plier, remonter. Renforce quadriceps, fessiers, endurance jambes."},{titre:"Trier le linge \u2013 Hinge r\xE9p\xE9t\xE9",duree:10,description:"Pour ramasser chaque pi\xE8ce au sol : hinge strict dos neutre, pouss\xE9e par talons. R\xE9p\xE9t\xE9 15-20 fois = s\xE9rie de Romanian Deadlift fonctionnel."},{titre:"Repasser \u2013 Station debout active",duree:30,description:"Transfert de poids jambe \xE0 jambe toutes les 30s. Relev\xE9s de talons toutes les 3 min. Gainage actif en repassant. Mobilit\xE9 cheville et endurance posturale."},{titre:"Repasser \u2013 Fentes sur place",duree:30,description:"En repassant de grandes pi\xE8ces (draps, nappes) : avancer en fente \xE0 chaque passage. Renforce quadriceps, fessiers, travail cardiovasculaire l\xE9ger."},{titre:"Ranger le linge dans les armoires \u2013 Squat + \xE9l\xE9vation",duree:10,description:"Prendre une pile du bas en squat, ranger en haut = \xE9l\xE9vation bras contr\xF4l\xE9e (\xE9paules stables). Encha\xEEner 10 fois. Circuit fonctionnel complet."},{titre:"D\xE9poussi\xE9rer les meubles \u2013 Mobilisation \xE9paules",duree:15,description:"Mouvements circulaires larges avec le chiffon : activer toute l'amplitude de l'\xE9paule, omoplate basse. Renforce coiffe des rotateurs et mobilit\xE9 thoracique."},{titre:"Nettoyer les vitres / miroirs \u2013 \xC9l\xE9vation bras tendu",duree:15,description:"Grands cercles et mouvements en 8 avec le bras tendu. Gainage actif pendant les mouvements hauts. Renforce \xE9paule, triceps, core."},{titre:"Nettoyer les surfaces hautes \u2013 Pointes de pieds",duree:10,description:"Pour atteindre en hauteur : monter sur pointes de pieds lentement (3 temps), tenir 2s, redescendre (3 temps). 10 fois = renforcement mollets, \xE9quilibre."},{titre:"Ranger les placards bas \u2013 Squat profond r\xE9p\xE9t\xE9",duree:15,description:"Chaque objet rang\xE9 en bas = squat profond. Chaque retrait = squat + hinge selon la position. 15-20 r\xE9p\xE9titions spontan\xE9es = s\xE9ance jambes."},{titre:"Ranger les placards hauts \u2013 Stabilit\xE9 \xE9paule",duree:15,description:"Porter les objets au-dessus de la t\xEAte : coude l\xE9g\xE8rement fl\xE9chi, omoplate engag\xE9e vers le bas. Renforce stabilisateurs d'\xE9paule, triceps, gainage."},{titre:"D\xE9placer des meubles l\xE9gers \u2013 Pouss\xE9e engag\xE9e",duree:10,description:"Pousser un meuble : pieds ancr\xE9s, genoux fl\xE9chis, pouss\xE9e depuis les jambes (pas le dos). Gainage maximal. Renforce tout le corps en cha\xEEne."},{titre:"Faire les lits \u2013 Fentes autour du lit",duree:10,description:"Se d\xE9placer autour du lit en fentes : pas en avant ou lat\xE9raux selon le c\xF4t\xE9 \xE0 border. 3 tours du lit = 15-20 fentes. Renforce jambes, \xE9quilibre."},{titre:"Changer les draps \u2013 Squat + rotation",duree:10,description:"Border les coins en squat profond. Saisir et tirer les draps en rotation thoracique contr\xF4l\xE9e (pas lombaire). Renforce core en rotation, jambes."},{titre:"Nettoyer la baignoire / douche \u2013 Fente basse",duree:10,description:"Nettoyer le fond en fente profonde ou \xE0 genou : descendre en contr\xF4le, frotter en gainage, remonter en poussant sur le talon. Renforce jambes, stabilit\xE9."},{titre:"Nettoyer les toilettes \u2013 Squat tenu",duree:5,description:"Rester en squat isom\xE9trique pendant le nettoyage du bas des toilettes. Dos droit, abdos engag\xE9s. Renforce quadriceps, endurance posturale."},{titre:"Nettoyer le lavabo \u2013 Stabilit\xE9 debout pench\xE9e",duree:5,description:"Se pencher en hinge (dos droit) vers le lavabo bas. Jambes l\xE9g\xE8rement fl\xE9chies, abdos engag\xE9s. Renforce ischios, lombes, endurance de gainage."},{titre:"Jardinage \u2013 D\xE9sherbage en squat",duree:30,description:"D\xE9sherber accroupi en squat profond (talons au sol si possible) plut\xF4t qu'\xE0 genoux courb\xE9. Alterner squat et demi-genou. Renforce jambes, cha\xEEne post\xE9rieure."},{titre:"Jardinage \u2013 B\xEAchage / ratissage",duree:30,description:"B\xEAcher : pousser avec le pied, tirer avec les bras et hanche (pas le dos). Rotation du buste contr\xF4l\xE9e. Renforce tout le corps, mobilit\xE9 thoracique."},{titre:"Jardinage \u2013 Port de terreau / arrosage",duree:20,description:"Porter l'arrosoir ou le sac de terreau en farmer's walk. Remplir/vider en hinge. Renforce avant-bras, trap\xE8zes, cha\xEEne post\xE9rieure."},{titre:"Mont\xE9e et descente des escaliers \u2013 Step-up renforc\xE9",duree:10,description:"Monter en posant le pied entier (pas juste la pointe), pousser sur le talon, dos droit. Descendre lentement (excentrique). Renforce quadriceps, fessiers, mollets."},{titre:"Monter des charges (caves, greniers) \u2013 Circuit complet",duree:15,description:"Porter une caisse : hinge pour soulever, gainage maximal en montant les escaliers, poser en squat. Renforce tout le corps en condition fonctionnelle."},{titre:"Nettoyage de la voiture \u2013 Mobilisation compl\xE8te",duree:20,description:"Alterner : se pencher (hinge) pour le bas, \xE9l\xE9vation bras pour le toit, rotation tronc pour les c\xF4t\xE9s. Gainage actif tout le long. Mobilit\xE9 compl\xE8te."},{titre:"Trier / vider des cartons \u2013 Hinge + portage",duree:20,description:"Chaque carton = hinge pour soulever, farmer's walk pour d\xE9placer, squat pour poser. R\xE9p\xE9ter consciemment. Renforce dos, jambes, core fonctionnel."}]};function Rt(){return Math.random().toString(36).slice(2,9)}function ul(e){return e?.length?Math.round(e.filter(t=>t.coachValide).length/e.length*100):0}function Ge(){return new Date().toISOString().split("T")[0]}function ze(e){if(!e)return"";let[t,i,n]=e.split("-");return`${n}/${i}/${t}`}function rl(e){return Math.round((new Date(e)-new Date(Ge()))/864e5)}function Kn(e){return e>=Ge()}function fc(e){let t=rl(e);return t>=0&&t<=7}function _m(e){let t=ul(e.programme),i=[`EX HOME \u2013 Programme de ${e.nom}`,`Coach : ${e.coach}  |  Depuis le : ${ze(e.dateDebut)}  |  Statut : ${In[e.statut]?.label}`,`Progression : ${t}%

  function readNativeJournal(id) { try { var v = localStorage.getItem("exhome_nutrition_" + id); return v ? JSON.parse(v) : null; } catch (e) { return null; } }
  function pushNutriJournal(id) { var j = readNativeJournal(id); return cloudPut(id + "-nutrijournal", { journal: j, updatedAt: new Date().toISOString() }); }
  function clearNutriJournal(id) { return cloudPut(id + "-nutrijournal", { journal: null, revoked: true, updatedAt: new Date().toISOString() }); }
  function syncNutriJournal(id) { var a = localNutriAudit(id); if (a && a.consent) return pushNutriJournal(id); return Promise.resolve(); }
  function loadNutriJournal(id) { return cloudGet(id + "-nutrijournal").then(function (r) { return r ? r.journal : null; }).catch(function () { return null; }); }

  function nutriRadio(qdef, current, onPick) {
    var wrap = document.createElement("div"); wrap.style.cssText = "margin-bottom:14px";
    var l = document.createElement("div"); l.style.cssText = "font-size:12px;font-weight:600;margin-bottom:7px;color:" + C.text; l.textContent = qdef.q; wrap.appendChild(l);
    var row = document.createElement("div"); row.style.cssText = "display:flex;flex-wrap:wrap;gap:6px";
    function render(sel) { row.innerHTML = ""; qdef.opts.forEach(function (opt) { var on = sel === opt; var b = document.createElement("button"); b.textContent = opt; b.style.cssText = "padding:8px 12px;border-radius:18px;border:" + (on ? "1.5px solid " + C.gold : "1px solid " + C.border) + ";background:" + (on ? C.gold : "transparent") + ";color:" + (on ? C.bg : C.text) + ";font-size:12px;font-weight:" + (on ? 700 : 500) + ";cursor:pointer"; b.onclick = function () { onPick(opt); render(opt); }; row.appendChild(b); }); }
    render(current); wrap.appendChild(row); return wrap;
  }
  function nutriText(qdef, current, onInput) {
    var wrap = document.createElement("div"); wrap.style.cssText = "margin-bottom:14px";
    var l = document.createElement("div"); l.style.cssText = "font-size:12px;font-weight:600;margin-bottom:7px;color:" + C.text; l.textContent = qdef.q; wrap.appendChild(l);
    var ta = document.createElement("textarea"); ta.value = current || ""; ta.placeholder = qdef.ph || ""; ta.rows = 2; ta.style.cssText = "width:100%;box-sizing:border-box;padding:10px;border-radius:10px;border:1px solid " + C.border + ";background:" + C.surf + ";color:" + C.text + ";font:inherit;resize:vertical"; ta.oninput = function () { onInput(ta.value); }; wrap.appendChild(ta); return wrap;
  }

  function openNutritionAudit(id, back) {
    var box = overlay(); header(box, "🥗 Audit nutrition", back);
    var body = document.createElement("div"); body.innerHTML = '<div style="color:' + C.dim + '">Chargement…</div>'; box.appendChild(body);
    loadNutriAudit(id).then(function (a) {
      var ans = Object.assign({}, a.answers || {}), consentState = !!a.consent;
      body.innerHTML = "";
      var intro = document.createElement("div"); intro.style.cssText = "font-size:12px;color:" + C.dim + ";margin-bottom:14px"; intro.textContent = "Ces réponses aident ton coach à comprendre tes habitudes alimentaires et à mieux t'accompagner."; body.appendChild(intro);
      NUTRI_Q.forEach(function (q) { body.appendChild(nutriRadio(q, ans[q.k], function (v) { ans[q.k] = v; })); });
      NUTRI_TEXT.forEach(function (q) { body.appendChild(nutriText(q, ans[q.k], function (v) { ans[q.k] = v; })); });

      var cBox = document.createElement("div"); cBox.style.cssText = "background:" + C.card + ";border:1px solid " + C.gold + "55;border-radius:12px;padding:12px;margin:6px 0 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer";
      var sw = document.createElement("div");
      function drawSw() { sw.style.cssText = "width:44px;height:25px;border-radius:14px;flex-shrink:0;position:relative;background:" + (consentState ? C.ok : C.border); sw.innerHTML = '<div style="position:absolute;top:2px;left:' + (consentState ? "21px" : "2px") + ';width:21px;height:21px;border-radius:50%;background:#fff;transition:left .15s"></div>'; }
      drawSw();
      var ctxt = document.createElement("div"); ctxt.innerHTML = '<div style="font-size:12px;font-weight:700;color:' + C.text + '">J\'autorise mon coach à consulter mon journal alimentaire</div><div style="font-size:11px;color:' + C.dim + ';margin-top:3px">Ton journal de l\'app sera partagé avec ton coach. Tu peux le désactiver à tout moment.</div>';
      cBox.onclick = function () { consentState = !consentState; drawSw(); };
      cBox.appendChild(sw); cBox.appendChild(ctxt); body.appendChild(cBox);

      var save = document.createElement("button"); save.textContent = "Enregistrer mon audit"; save.style.cssText = "width:100%;padding:12px;border:none;border-radius:10px;background:" + C.gold + ";color:" + C.bg + ";font-weight:800;cursor:pointer";
      var okMsg = document.createElement("div"); okMsg.style.cssText = "text-align:center;font-size:12px;color:" + C.ok + ";margin-top:8px;height:16px";
      save.onclick = function () {
        saveNutriAudit(id, { answers: ans, consent: consentState }).then(function () {
          (consentState ? pushNutriJournal(id) : clearNutriJournal(id));
          okMsg.textContent = consentState ? "✓ Audit enregistré · journal partagé" : "✓ Audit enregistré · journal non partagé";
        });
      };
      body.appendChild(save); body.appendChild(okMsg);
    }).catch(function () { body.innerHTML = '<div style="color:#E07060">Erreur de chargement.</div>'; });
  }

  function renderJournal(j) {
    var meals = ["Petit-déjeuner", "Déjeuner", "Dîner", "Collation"];
    var all = []; if (j && typeof j === "object") Object.keys(j).forEach(function (k) { if (Array.isArray(j[k])) all = all.concat(j[k]); });
    var tot = all.reduce(function (a, x) { a.kcal += x.kcal || 0; a.p += x.p || 0; a.g += x.g || 0; a.l += x.l || 0; return a; }, { kcal: 0, p: 0, g: 0, l: 0 });
    var h = '<div style="background:' + C.card + ';border:1px solid ' + C.border + ';border-radius:12px;padding:12px"><div style="font-size:11px;color:' + C.dim + ';margin-bottom:8px">📋 Journal alimentaire partagé</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">' + chip("🔥", Math.round(tot.kcal), "kcal") + chip("Prot.", Math.round(tot.p) + "g", "") + chip("Gluc.", Math.round(tot.g) + "g", "") + chip("Lip.", Math.round(tot.l) + "g", "") + '</div>';
    meals.forEach(function (m) { var items = (j && j[m]) || []; if (!items.length) return; h += '<div style="font-size:12px;font-weight:700;color:' + C.gold + ';margin:8px 0 4px">' + m + '</div>'; items.forEach(function (x) { var nom = x.nom || x.name || x.libelle || "Aliment"; h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid ' + C.border + '"><span>' + String(nom).replace(/</g, "&lt;") + '</span><span style="color:' + C.dim + '">' + (x.kcal || 0) + ' kcal</span></div>'; }); });
    if (!all.length) h += '<div style="font-size:12px;color:' + C.dim + '">Journal vide pour le moment.</div>';
    return h + '</div>';
  }
  function coachNutritionSection(id, container) {
    if (!container) return;
    container.innerHTML = '<div style="font-size:12px;color:' + C.dim + '">Chargement nutrition…</div>';
    Promise.all([loadNutriAudit(id), loadNutriJournal(id)]).then(function (res) {
      var a = res[0] || { answers: {}, consent: false }, journal = res[1], ans = a.answers || {};
      var html = '<div style="font-size:12px;font-weight:800;color:' + C.gold + ';margin-bottom:10px">🥗 Nutrition</div>';
      var rows = [];
      NUTRI_Q.forEach(function (q) { if (ans[q.k]) rows.push([q.q, ans[q.k]]); });
      NUTRI_TEXT.forEach(function (q) { if (ans[q.k]) rows.push([q.q, ans[q.k]]); });
      if (rows.length) html += '<div style="background:' + C.card + ';border:1px solid ' + C.border + ';border-radius:12px;padding:12px;margin-bottom:10px">' + rows.map(function (r) { return '<div style="margin-bottom:8px"><div style="font-size:10px;color:' + C.dim + '">' + r[0] + '</div><div style="font-size:12px;color:' + C.text + '">' + String(r[1]).replace(/</g, "&lt;") + '</div></div>'; }).join("") + '</div>';
      else html += '<div style="font-size:12px;color:' + C.dim + ';margin-bottom:10px">Audit non encore rempli par la cliente.</div>';
      if (a.consent && journal) html += renderJournal(journal);
      else html += '<div style="background:' + C.card + ';border:1px dashed ' + C.border + ';border-radius:12px;padding:12px;font-size:12px;color:' + C.dim + '">🔒 Journal alimentaire non partagé (consentement non donné par la cliente).</div>';
      container.innerHTML = html;
    }).catch(function () { container.innerHTML = '<div style="color:#E07060;font-size:12px">Erreur nutrition.</div>'; });
  }
  /* ===================== Mesures & évolution (jour/semaine/mois) v11 ===================== */
  function lastValue(measures, k) { for (var i = measures.length - 1; i >= 0; i--) { if (measures[i][k] != null) return measures[i][k]; } return "–"; }
  function aggregate(measures, k, period) {
    var pts = measures.filter(function (m) { return m[k] != null; }).map(function (m) { return { d: new Date(m.date || m.ts), v: +m[k] }; });
    function bk(d) { if (period === "mois") return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); if (period === "semaine") { var o = new Date(d.getFullYear(), 0, 1); var w = Math.ceil((((d - o) / 86400000) + o.getDay() + 1) / 7); return d.getFullYear() + "-S" + w; } return d.toISOString().split("T")[0]; }
    var b = {}; pts.forEach(function (p) { var key = bk(p.d); (b[key] = b[key] || []).push(p.v); });
    var keys = Object.keys(b).sort(); var N = period === "mois" ? 12 : period === "semaine" ? 12 : 14; keys = keys.slice(-N);
    return keys.map(function (key) { var a = b[key]; return { label: key, value: Math.round(a.reduce(function (x, y) { return x + y; }, 0) / a.length * 10) / 10 }; });
  }
  function svgLineLabeled(vals, col) {
    var W = 300, Hh = 80, max = Math.max.apply(null, vals), min = Math.min.apply(null, vals), rng = (max - min) || 1;
    var pts = vals.map(function (v, i) { var x = vals.length > 1 ? i / (vals.length - 1) * W : 0, y = Hh - 10 - ((v - min) / rng) * (Hh - 20); return [x, y]; });
    var line = pts.map(function (p) { return p[0].toFixed(1) + "," + p[1].toFixed(1); }).join(" ");
    var dots = pts.map(function (p) { return '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="2.5" fill="' + col + '"/>'; }).join("");
    var lp = pts[pts.length - 1];
    return '<svg viewBox="0 0 ' + W + ' ' + Hh + '" width="100%" height="' + Hh + '"><polygon points="0,' + Hh + ' ' + line + ' ' + W + ',' + Hh + '" fill="' + col + '18"/><polyline points="' + line + '" fill="none" stroke="' + col + '" stroke-width="2"/>' + dots + '<circle cx="' + lp[0].toFixed(1) + '" cy="' + lp[1].toFixed(1) + '" r="4" fill="' + col + '"/></svg>';
  }
  function measureChart(measures, f, period) {
    var data = aggregate(measures, f.k, period);
    if (data.length < 2) return '<div style="font-size:12px;color:' + C.dim + ';padding:8px 0">Pas encore assez de points pour l\'évolution ' + (period === "jour" ? "journalière" : period === "semaine" ? "hebdomadaire" : "mensuelle") + '. Continue à scanner régulièrement.</div>';
    var vals = data.map(function (x) { return x.value; }), min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
    var first = vals[0], last = vals[vals.length - 1], delta = Math.round((last - first) * 10) / 10;
    var trend = delta > 0 ? ("▲ +" + delta) : delta < 0 ? ("▼ " + delta) : "→ stable";
    var good = (delta === 0) ? C.dim : (f.low ? (delta < 0 ? C.ok : "#E07060") : (delta > 0 ? C.ok : "#E07060"));
    return '<div>' + svgLineLabeled(vals, f.col || C.gold) + '<div style="display:flex;justify-content:space-between;font-size:11px;color:' + C.dim + ';margin-top:6px"><span>min ' + min + '</span><span style="color:' + good + ';font-weight:700">' + trend + (f.unit ? (" " + f.unit) : "") + '</span><span>max ' + max + '</span></div></div>';
  }
  function openMeasures(id, back) {
    var box = overlay(); header(box, "📊 Mesures & évolution", back); var __nm = (findClient(id) || {}).nom; if (__nm) { var __s = document.createElement("div"); __s.style.cssText = "font-size:12px;color:" + C.gold + ";font-weight:700;margin:-4px 0 12px"; __s.textContent = "Cliente : " + __nm; box.appendChild(__s); }
    var body = document.createElement("div"); body.innerHTML = '<div style="color:' + C.dim + '">Chargement…</div>'; box.appendChild(body);
    loadAllMeasures(id).then(function (measures) {
      body.innerHTML = "";
      if (!measures || !measures.length) { body.innerHTML = '<div style="font-size:13px;color:' + C.dim + '">Aucune mesure pour le moment. Scanne une mesure pour démarrer le suivi.</div>'; return; }
      var present = SCAN_FIELDS.filter(function (f) { return measures.some(function (m) { return m[f.k] != null; }); });
      var info = document.createElement("div"); info.style.cssText = "font-size:11px;color:" + C.dim + ";margin-bottom:12px"; info.textContent = "Appuie sur une mesure (＋) pour voir son évolution : jour / semaine / mois."; body.appendChild(info);
      present.forEach(function (f) {
        var last = lastValue(measures, f.k);
        var d = document.createElement("details"); d.style.cssText = "background:" + C.card + ";border:1px solid " + C.border + ";border-radius:12px;margin-bottom:8px;overflow:hidden";
        var sum = document.createElement("summary"); sum.style.cssText = "list-style:none;cursor:pointer;padding:12px;display:flex;align-items:center;gap:8px;font-size:13px";
        sum.innerHTML = '<span style="font-size:16px">' + f.emoji + '</span><span style="flex:1;font-weight:600">' + f.label + '</span><span style="font-weight:800;color:' + (f.col || C.gold) + '">' + last + (f.unit ? (" " + f.unit) : "") + '</span><span style="color:' + C.dim + ';font-size:15px">＋</span>';
        d.appendChild(sum);
        var cont = document.createElement("div"); cont.style.cssText = "padding:0 12px 12px";
        var period = "jour";
        var tg = document.createElement("div"); tg.style.cssText = "display:flex;gap:6px;margin-bottom:8px";
        var chartH = document.createElement("div");
        function drawChart() { chartH.innerHTML = measureChart(measures, f, period); }
        ["jour", "semaine", "mois"].forEach(function (p) {
          var btn = document.createElement("button"); btn.textContent = p.charAt(0).toUpperCase() + p.slice(1);
          function style() { var on = period === p; btn.style.cssText = "flex:1;padding:7px;border-radius:8px;border:" + (on ? "1.5px solid " + C.gold : "1px solid " + C.border) + ";background:" + (on ? C.gold : "transparent") + ";color:" + (on ? C.bg : C.text) + ";font-size:11px;font-weight:" + (on ? 700 : 500) + ";cursor:pointer"; }
          style(); btn.__upd = style;
          btn.onclick = function () { period = p; Array.prototype.forEach.call(tg.children, function (c) { if (c.__upd) c.__upd(); }); drawChart(); };
          tg.appendChild(btn);
        });
        cont.appendChild(tg); cont.appendChild(chartH); d.appendChild(cont);
        d.addEventListener("toggle", function () { if (d.open) drawChart(); });
        body.appendChild(d);
      });
    }).catch(function () { body.innerHTML = '<div style="color:#E07060">Erreur de chargement.</div>'; });
  }
  /* ===================== Fusion mesures natives (Santé) + scans (lecture seule) v12 ===================== */
  var NATIVE_MAP = { poids: "poids", masseGrasse: "graisse", masseMusc: "muscle", eauCorp: "eau", basale: "metabolisme", imc: "imc", masseOsseuse: "osseuse", tourTaille: "tourTaille", tourHanches: "tourHanches", fcRepos: "fcRepos", pas: "pas", sommeil: "sommeil", calories: "calories", viscerale: "viscerale", sousCutanee: "sousCutanee", proteines: "proteines", muscleSquel: "muscleSquel", masseMaigre: "maigre", ageMeta: "age" };
  function nativeMeasures(id) {
    var c = findClient(id) || {}; var arr = (c.sante && c.sante.mesures) || [];
    if (!Array.isArray(arr)) return [];
    return arr.map(function (m) {
      var o = { date: m.date || today(), ts: m.ts || (m.date ? new Date(m.date).getTime() : Date.now()), source: m.source || "santé" };
      Object.keys(NATIVE_MAP).forEach(function (nk) { if (m[nk] != null && m[nk] !== "") { var v = parseFloat(m[nk]); if (!isNaN(v)) o[NATIVE_MAP[nk]] = v; } });
      return o;
    });
  }
  function loadAllMeasures(id) {
    return loadScans(id).then(function (scans) {
      var all = (scans || []).concat(nativeMeasures(id));
      all.sort(function (a, b) { return (a.date || "").localeCompare(b.date || "") || ((a.ts || 0) - (b.ts || 0)); });
      return all;
    }).catch(function () { return nativeMeasures(id); });
  }
})();
