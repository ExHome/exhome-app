 bird-dog",duree:10,description:"\xC0 quatre pattes, tendre bras droit + jambe gauche simultan\xE9ment. 10 r\xE9p. chaque c\xF4t\xE9."}],mobilite:[{titre:"Rotation cervicale lente",duree:3,description:"Tourner lentement la t\xEAte gauche-droite, 5 fois de chaque c\xF4t\xE9. Respiration continue."},{titre:"Ouverture des hanches \u2013 figure 4",duree:8,description:"Allong\xE9 sur le dos, croiser la cheville droite sur la cuisse gauche, tirer vers soi. 45s par c\xF4t\xE9."},{titre:"Rotation thoracique assis",duree:5,description:"Assis sur un tabouret, croiser les bras sur les \xE9paules, tourner le buste \xE0 droite et \xE0 gauche. 10 r\xE9p."},{titre:"Mobilisation chevilles \u2013 cercles",duree:3,description:"Assis, faire des grands cercles avec les pieds dans les deux sens. 10 fois chaque direction."},{titre:"\xC9tirement ischios \u2013 hamstrings debout",duree:5,description:"Debout, poser le talon sur une chaise, garder le dos droit et pencher l\xE9g\xE8rement le buste en avant."},{titre:"Ouverture \xE9paules \u2013 Eagle arms",duree:4,description:"Enrouler les bras l'un autour de l'autre \xE0 hauteur d'\xE9paule. Lever les coudes. 30s par c\xF4t\xE9."},{titre:"Squat assis-debout lent",duree:6,description:"S'asseoir et se lever d'une chaise en 4 temps, sans utiliser les mains. 10 r\xE9p\xE9titions."}],force:[{titre:"Gainage ventral \u2013 3 s\xE9ries",duree:10,description:"Position planche sur avant-bras. Tenir 30s, 3 s\xE9ries avec 30s de repos."},{titre:"Pont fessier",duree:8,description:"Allong\xE9 sur le dos, pieds \xE0 plat, soulever le bassin jusqu'\xE0 aligner hanches et \xE9paules. 15 r\xE9p, 3 s\xE9ries."},{titre:"Squat au poids du corps",duree:10,description:"Pieds \xE0 la largeur des \xE9paules, descendre comme pour s'asseoir. 15 r\xE9p\xE9titions, 3 s\xE9ries."},{titre:"Pompes sur les genoux",duree:8,description:"Mains au sol largeur \xE9paules, genoux pos\xE9s. Fl\xE9chir les coudes jusqu'\xE0 effleurer le sol. 10 r\xE9p, 3 s\xE9ries."},{titre:"Fentes avant altern\xE9es",duree:10,description:"Pas en avant, fl\xE9chir les deux genoux \xE0 90\xB0, revenir. 10 r\xE9p par jambe, 3 s\xE9ries."},{titre:"Superman dorsal",duree:6,description:"\xC0 plat ventre, lever simultan\xE9ment les bras et les jambes. Tenir 3s, 10 r\xE9p\xE9titions."},{titre:"Step-up sur marche",duree:8,description:"Monter et descendre d'une marche en alternant les jambes. 20 r\xE9p\xE9titions, 3 s\xE9ries."}],respiration:[{titre:"Coh\xE9rence cardiaque 5-5",duree:5,description:"Inspirer 5 secondes, expirer 5 secondes. 6 cycles par minute pendant 5 minutes."},{titre:"Respiration abdominale profonde",duree:5,description:"Main sur le ventre, gonfler le ventre \xE0 l'inspiration, d\xE9gonfler \xE0 l'expiration. 10 cycles."},{titre:"Respiration 4-7-8 (anti-stress)",duree:5,description:"Inspirer 4s, retenir 7s, expirer lentement 8s. 4 cycles. Puissant avant le coucher."},{titre:"Scan corporel + respiration",duree:10,description:"Allong\xE9, parcourir chaque partie du corps en la rel\xE2chant consciemment avec l'expiration."},{titre:"Box breathing (militaire)",duree:5,description:"Inspirer 4s, retenir 4s, expirer 4s, retenir 4s. 6 cycles. Id\xE9al avant un moment stressant."},{titre:"Respiration altern\xE9e des narines",duree:5,description:"Fermer la narine droite, inspirer \xE0 gauche. Fermer la gauche, expirer \xE0 droite. 5 cycles."}],menager:[{titre:"Vaisselle \xE0 la main \u2013 Relev\xE9s de talons",duree:15,description:"Pendant la vaisselle : relev\xE9s de talons altern\xE9s toutes les 2 min. Pieds parall\xE8les, genoux d\xE9verrouill\xE9s. Renforce mollets et p\xE9rin\xE9e."},{titre:"Vaisselle \xE0 la main \u2013 \xC9quilibre unipodal",duree:15,description:"Tenir sur une jambe 30s en faisant la vaisselle, alterner. Renforce proprioception, cheville et stabilisateurs du genou."},{titre:"Vaisselle \xE0 la main \u2013 Gainage debout",duree:15,description:"Contracter abdominaux et fessiers en expirant toutes les 2 min. Maintenir 10s. Posture colonne nt de direction. Renforce mobilit\xE9 rotateurs de hanche et stabilit\xE9 lombaire."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Fentes lat\xE9rales",duree:20,description:"Chaque passage large = fente lat\xE9rale : jambe portante fl\xE9chie, jambe oppos\xE9e tendue. Renforce adducteurs, abducteurs, fessiers."},{titre:"Balayer / passer la serpilli\xE8re \u2013 Gainage de marche",duree:20,description:"Serrer les abdominaux et contracter les fessiers \xE0 chaque pas. Maintenir la colonne neutre tout le long. Endurance musculaire posturale."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Cross-body",duree:20,description:"\xC0 quatre pattes : alterner bras droit + jambe gauche tendus (bird-dog) entre chaque mouvement de lavage. Renforce gainage profond et coordination."},{titre:"Laver le sol \xE0 genoux / quatre pattes \u2013 Agenouillement contr\xF4l\xE9",duree:15,description:"Descendre en fente contr\xF4l\xE9e (4 temps), poser genou doucement, remonter en poussant sur le talon. Renforce quadriceps, contr\xF4le excentrique."},{titre:"Nettoyer les plinthes \u2013 Squat maintenu",duree:10,description:"Travailler en position squat isom\xE9trique (cuisses parall\xE8les au sol) pour nettoyer les plinthes. Renforce quadriceps et stabilit\xE9 du genou."},{titre:"\xC9tendre le linge \u2013 \xC9l\xE9vation scapulaire",duree:15,description:"Pour chaque pi\xE8ce suspendue : \xE9lever les bras en gardant omoplates basses et rapproch\xE9es. Pas de compensation cervicale. Renforce dentel\xE9, trap\xE8zes."},{titre:"\xC9tendre le linge \u2013 Relev\xE9s de genoux",duree:15,description:"Entre chaque pi\xE8ce : 5 relev\xE9s de genoux altern\xE9s (marche sur place haute). Renforce psoas, core, coordination cardio l\xE9g\xE8re."},{titre:"Plier le linge \u2013 Squat maintenu",duree:15,description:"Plier chaque pi\xE8ce en position squat isom\xE9trique (cuisses \xE0 90\xB0). Descendre, plier, remonter. Renforce quadriceps, fessiers, endurance jambes."},{titre:"Trier le linge \u2013 Hinge r\xE9p\xE9t\xE9",duree:10,description:"Pour ramasser chaque pi\xE8ce au sol : hinge strict dos neutre, pouss\xE9e par talons. R\xE9p\xE9t\xE9 15-20 fois = s\xE9rie de Romanian Deadlift fonctionnel."},{titre:"Repasser \u2013 Station debout active",duree:30,description:"Transfert de poids jambe \xE0 jambe toutes les 30s. Relev\xE9s de talons toutes les 3 min. Gainage actif en repassant. Mobilit\xE9 cheville et endurance posturale."},{titre:"Repasser \u2013 Fentes sur place",duree:30,description:"En repassant de grandes pi\xE8ces (draps, nappes) : avancer en fente \xE0 chaque passage. Renforce quadriceps, fessiers, travail cardiovasculaire l\xE9ger."},{titre:"Ranger le linge dans les armoires \u2013 Squat + \xE9l\xE9vation",duree:10,description:"Prendre une pile du bas en squat, ranger en haut = \xE9l\xE9vation bras contr\xF4l\xE9e (\xE9paules stables). Encha\xEEner 10 fois. Circuit fonctionnel complet."},{titre:"D\xE9poussi\xE9rer les meubles \u2013 Mobilisation \xE9paules",duree:15,description:"Mouvements circulaires larges avec le chiffon : activer toute l'amplitude de l'\xE9paule, omoplate basse. Renforce coiffe des rotateurs et mobilit\xE9 thoracique."},{titre:"Nettoyer les vitres / miroirs \u2013 \xC9l\xE9vation bras tendu",duree:15,description:"Grands cercles et mouvements en 8 avec le bras tendu. Gainage actif pendant les mouvements hauts. Renforce \xE9paule, triceps, core."},{titre:"Nettoyer les surfaces hautes \u2013 Pointes de pieds",duree:10,description:"Pour atteindre en hauteur : monter sur pointes de pieds lentement (3 temps), tenir 2s, redescendre (3 temps). 10 fois = renforcement mollets, \xE9quilibre."},{titre:"Ranger les placards bas \u2013 Squat profond r\xE9p\xE9t\xE9",duree:15,description:"Chaque objet rang\xE9 en bas = squat profond. Chaque retrait = squat + hinge selon la position. 15-20 r\xE9p\xE9titions spontan\xE9es = s\xE9ance jambes."},{titre:"Ranger les placards hauts \u2013 Stabilit\xE9 \xE9paule",duree:15,description:"Porter les objets au-dessus de la t\xEAte : coude l\xE9g\xE8rement fl\xE9chi, omoplate engag\xE9e vers le bas. Renforce stabilisateurs d'\xE9paule, triceps, gainage."},{titre:"D\xE9placer des meubles l\xE9gers \u2013 Pouss\xE9e engag\xE9e",duree:10,description:"Pousser un meuble : pieds ancr\xE9s, genoux fl\xE9chis, pouss\xE9e depuis les jambes (pas le dos). Gainage maximal. Renforce tout le corps en cha\xEEne."},{titre:"Faire les lits \u2013 Fentes autour du lit",duree:10,description:"Se d\xE9placer autour du lit en fentes : pas en avant ou lat\xE9raux selon le c\xF4t\xE9 \xE0 border. 3 tours du lit = 15-20 fentes. Renforce jambes, \xE9quilibre."},{titre:"Changer les draps \u2013 Squat + rotation",duree:10,description:"Border les coins en squat profond. Saisir et tirer les draps en rotation thoracique contr\xF4l\xE9e (pas lombaire). Renforce core en rotation, jambes."},{titre:"Nettoyer la baignoire / douche \u2013 Fente basse",duree:10,description:"Nettoyer le fond en fente profonde ou \xE0 genou : descendre en contr\xF4le, frotter en gainage, remonter en poussant sur le talon. Renforce jambes, stabilit\xE9."},{titre:"Nettoyer les toilettes \u2013 Squat tenu",duree:5,description:"Rester en squat isom\xE9trique pendant le nettoyage du bas des toilettes. Dos droit, abdos engag\xE9s. Renforce quadriceps, endurance posturale."},{titre:"Nettoyer le lavabo \u2013 Stabilit\xE9 debout pench\xE9e",duree:5,description:"Se pencher en hinge (dos droit) vers le lavabo bas. Jambes l\xE9g\xE8rement fl\xE9chies, abdos engag\xE9s. Renforce ischios, lombes, endurance de gainage."},{titre:"Jardinage \u2013 D\xE9sherbage en squat",duree:30,description:"D\xE9sherber accroupi en squat profond (talons au sol si possible) plut\xF4t qu'\xE0 genoux courb\xE9. Alterner squat et demi-genou. Renforce jambes, cha\xEEne post\xE9rieure."},{titre:"Jardinage \u2013 B\xEAchage / ratissage",duree:30,description:"B\xEAcher : pousser avec le pied, tirer avec les bras et hanche (pas le dos). Rotation du buste contr\xF4l\xE9e. Renforce tout le corps, mobilit\xE9 thoracique."},{titre:"Jardinage \u2013 Port de terreau / arrosage",duree:20,description:"Porter l'arrosoir ou le sac de terreau en farmer's walk. Remplir/vider en hinge. Renforce avant-bras, trap\xE8zes, cha\xEEne post\xE9rieure."},{titre:"Mont\xE9e et descente des escaliers \u2013 Step-up renforc\xE9",duree:10,description:"Monter en posant le pied entier (pas juste la pointe), pousser sur le talon, dos droit. Descendre lentement (excentrique). Renforce quadriceps, fessiers, mollets."},{titre:"Monter des charges (caves, greniers) \u2013 Circuit complet",duree:15,description:"Porter une caisse : hinge pour soulever, gainage maximal en montant les escaliers, poser en squat. Renforce tout le corps en condition fonctionnelle."},{titre:"Nettoyage de la voiture \u2013 Mobilisation compl\xE8te",duree:20,description:"Alterner : se pencher (hinge) pour le bas, \xE9l\xE9vation bras pour le toit, rotation tronc pour les c\xF4t\xE9s. Gainage actif tout le long. Mobilit\xE9 compl\xE8te."},{titre:"Trier / vider des cartons \u2013 Hinge + portage",duree:20,description:"Chaque carton = hinge pour soulever, farmer's walk pour d\xE9placer, squat pour poser. R\xE9p\xE9ter consciemment. Renforce dos, jambes, core fonctionnel."}]},Ju={clients:[{id:"c1",nom:"Sophie Martin",email:"sophie.m@email.com",coach:"Aude",dateDebut:"2026-05-10",statut:"en-cours",objectif:"Douleurs lombaires chroniques, bureau s\xE9dentaire. R\xE9duire les tensions et am\xE9liorer l'\xE9nergie quotidienne.",profil:{niveau:"debutant",frequence:"3x/semaine",contraintes:"Lombaires fragiles, \xE9viter les flexions profondes"},messages:[{id:"m1",auteur:"Aude",role:"coach",date:"2026-06-02",texte:"Bravo Sophie ! Ta progression est vraiment encourageante \u{1F4AA}"},{id:"m2",auteur:"Sophie Martin",role:"client",date:"2026-06-03",texte:"Merci ! La respiration m'aide vraiment \xE0 d\xE9compresser le soir."}],seances:[{id:"s1",date:"2026-05-15",heure:"10:00",duree:60,no
